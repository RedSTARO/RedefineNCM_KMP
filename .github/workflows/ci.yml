name: KMP CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─── Android ────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew :androidApp:assembleRelease

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: mv "${{ steps.sign_app.outputs.signedReleaseFile }}" androidApp/build/outputs/apk/release/RedefineNCM_KMP_signed.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/release/RedefineNCM_KMP_signed.apk

  # ─── Desktop · Linux ────────────────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop · Linux (.deb)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .deb package
        run: |
          chmod +x gradlew
          ./gradlew :desktopApp:packageDeb

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb

  # ─── Desktop · Windows ──────────────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop · Windows (.msi)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .msi installer
        run: ./gradlew :desktopApp:packageMsi

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi

  # ─── Desktop · macOS + iOS framework ────────────────────────────────────────
  build-desktop-macos:
    name: Desktop · macOS (.dmg) + iOS framework
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .dmg image
        run: |
          chmod +x gradlew
          ./gradlew :desktopApp:packageDmg

      - name: Compile iOS Simulator framework
        # Verifies iOS Kotlin compilation; produces the Shared.framework used by Xcode.
        # Full IPA signing requires Xcode provisioning and is not done in CI.
        run: ./gradlew :shared:linkReleaseFrameworkIosSimulatorArm64

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg

  # ─── Telegram 通知（所有构建完成后汇总推送）────────────────────────────────────
  notify-telegram:
    name: Notify Telegram
    needs: [ build-android, build-desktop-linux, build-desktop-windows, build-desktop-macos ]
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count commits since last tag
        id: commitcount
        run: |
          git fetch --tags
          latest_tag=$(git tag --sort=-creatordate | head -n1)
          if [ -z "$latest_tag" ]; then
            count=$(git rev-list --count HEAD)
          else
            count=$(git rev-list --count "${latest_tag}..HEAD")
          fi
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: gitinfo
        run: |
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Send all artifacts to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK=$(find dist/ -name "*.apk" 2>/dev/null | head -1)
          DEB=$(find dist/ -name "*.deb" 2>/dev/null | head -1)
          MSI=$(find dist/ -name "*.msi" 2>/dev/null | head -1)
          DMG=$(find dist/ -name "*.dmg" 2>/dev/null | head -1)

          RAW_MSG="${{ steps.gitinfo.outputs.commit_msg }}"
          MSG=$(echo "$RAW_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          SHA="${{ steps.gitinfo.outputs.commit_sha }}"
          COUNT="${{ steps.commitcount.outputs.count }}"
          REF="${{ github.ref_name }}"

          CAPTION=$(printf '<b>RedefineNCM KMP</b>  ·  <code>%s</code>\n\n📝 %s\n🔖 <code>%s</code>  ·  +%s commits\n\n──────────────────\n🤖  Android   <code>RedefineNCM_KMP_signed.apk</code>\n🐧  Linux     <code>.deb</code>\n🪟  Windows   <code>.msi</code>\n🍎  macOS     <code>.dmg</code>' \
            "$REF" "$MSG" "$SHA" "$COUNT")

          # Build media JSON and curl args from whichever artifacts actually exist
          media='[]'
          curl_files=()
          first=true

          add_doc() {
            local key="$1" path="$2"
            [ -z "$path" ] || [ ! -f "$path" ] && return
            if $first; then
              media=$(echo "$media" | jq --arg k "$key" --arg cap "$CAPTION" \
                '. + [{"type":"document","media":("attach://"+$k),"caption":$cap,"parse_mode":"HTML"}]')
              first=false
            else
              media=$(echo "$media" | jq --arg k "$key" \
                '. + [{"type":"document","media":("attach://"+$k)}]')
            fi
            curl_files+=(-F "${key}=@${path}")
          }

          add_doc apk "$APK"
          add_doc deb "$DEB"
          add_doc msi "$MSI"
          add_doc dmg "$DMG"

          if [ "${#curl_files[@]}" -eq 0 ]; then
            echo "No artifacts found, skipping Telegram notification"
            exit 0
          fi

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMediaGroup" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F "media=${media}" \
            "${curl_files[@]}"

  # ─── GitHub Release (tag only) ──────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [ build-android, build-desktop-linux, build-desktop-windows, build-desktop-macos ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog since last tag
        id: changelog
        run: |
          git fetch --tags
          mapfile -t tags < <(git tag --sort=-creatordate)
          current="${tags[0]}"
          previous="${tags[1]:-}"
          if [ -z "$previous" ]; then
            log=$(git log --oneline "$current")
            count=$(git rev-list --count "$current")
          else
            log=$(git log --oneline "${previous}..${current}")
            count=$(git rev-list --count "${previous}..${current}")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$log" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: dist/**/*
          body: |
            🎉 **RedefineNCM KMP ${{ github.ref_name }}**

            📦 **${{ steps.changelog.outputs.count }} commits since last release**
            ```
            ${{ steps.changelog.outputs.log }}
            ```

            | Platform | File |
            |----------|------|
            | Android | `RedefineNCM_KMP_signed.apk` |
            | Linux | `.deb` package |
            | Windows | `.msi` installer |
            | macOS | `.dmg` image |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
