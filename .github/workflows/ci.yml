name: KMP CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests and compile checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Reject runtime dumps and JWT credentials
        run: |
          python scripts/check_tracked_secrets.py --self-test

      - name: Run tests and compile checks
        run: |
          chmod +x gradlew
          # The Linux JVM suite contains a real MPRIS client/server smoke test.
          dbus-run-session -- ./gradlew --no-daemon :shared:jvmTest
          ./gradlew \
            :shared:testAndroidHostTest \
            :desktopApp:compileKotlin

  # ─── Android ────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :androidApp:assembleRelease
          cp androidApp/build/outputs/apk/release/*-unsigned.apk \
            androidApp/build/outputs/apk/release/RedefineNCM_KMP_release-unsigned.apk

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apk-verification
          path: androidApp/build/outputs/apk/**/RedefineNCM_KMP_*.apk

  # ─── Web · Wasm ────────────────────────────────────────────────────────────
  build-web:
    name: Web · Wasm (tests + production bundle)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Test and build production distribution
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            :shared:wasmJsBrowserTest \
            :shared:wasmJsBrowserDistribution

      - name: Package Web distribution
        run: |
          mkdir -p shared/build/distributions
          (
            cd shared/build/dist/wasmJs/productionExecutable
            zip -qr ../../../distributions/RedefineNCM_KMP_web.zip .
          )

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-wasm-distribution
          path: shared/build/distributions/RedefineNCM_KMP_web.zip

  # Push builds publish an installable minified release APK; pull requests only verify unsigned release output.
  sign-android:
    name: Sign Android release
    needs: build-android
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-apk-verification
          path: unsigned-apk

      - name: Prepare release APK for signing
        run: |
          source_apk=$(find unsigned-apk -name '*release-unsigned.apk' -print -quit)
          test -n "$source_apk"
          mkdir -p androidApp/build/outputs/apk/release
          cp "$source_apk" androidApp/build/outputs/apk/release/RedefineNCM_KMP_release-unsigned.apk

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: mv "${{ steps.sign_app.outputs.signedReleaseFile }}" androidApp/build/outputs/apk/release/RedefineNCM_KMP_signed.apk

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apk-signed
          path: androidApp/build/outputs/apk/release/RedefineNCM_KMP_signed.apk

  # ─── Desktop · Linux ────────────────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop · Linux (.deb)
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .deb package
        run: |
          chmod +x gradlew
          ./gradlew :desktopApp:packageDeb

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb

  # ─── Desktop · Windows ──────────────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop · Windows (.msi)
    needs: test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .msi installer
        run: ./gradlew :shared:jvmTest :desktopApp:packageMsi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi

  # ─── Desktop · macOS + iOS framework ────────────────────────────────────────
  build-desktop-macos:
    name: Desktop · macOS (.dmg) + iOS framework
    needs: test
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .dmg image
        run: |
          chmod +x gradlew
          # jvmTest executes the native MPNowPlayingInfoCenter/remote-command smoke on macOS.
          ./gradlew :shared:jvmTest :desktopApp:packageDmg

      - name: Compile iOS Simulator framework
        # Verifies iOS Kotlin compilation; produces the Shared.framework used by Xcode.
        # Full IPA signing requires Xcode provisioning and is not done in CI.
        run: ./gradlew :shared:iosSimulatorArm64Test :shared:linkReleaseFrameworkIosSimulatorArm64

      - name: Compile iOS app and Live Activity widget
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg

  # ─── Telegram 通知（所有构建完成后汇总推送）────────────────────────────────────
  notify-telegram:
    name: Notify Telegram
    needs: [ build-android, sign-android, build-web, build-desktop-linux, build-desktop-windows, build-desktop-macos ]
    if: always() && github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Count commits since last tag
        id: commitcount
        run: |
          git fetch --force --tags
          latest_tag=$(git tag --sort=-creatordate | head -n1)
          if [ -z "$latest_tag" ]; then
            count=$(git rev-list --count HEAD)
          else
            count=$(git rev-list --count "${latest_tag}..HEAD")
          fi
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: gitinfo
        run: |
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Send artifacts to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK=$(find dist/ -name "RedefineNCM_KMP_signed.apk" -print -quit)
          DEB=$(find dist/ -name "*.deb" 2>/dev/null | head -1)
          MSI=$(find dist/ -name "*.msi" 2>/dev/null | head -1)
          DMG=$(find dist/ -name "*.dmg" 2>/dev/null | head -1)
          WEB=$(find dist/ -name "RedefineNCM_KMP_web.zip" 2>/dev/null | head -1)

          # Returns ✅ if the file exists, ❌ otherwise
          status() { [ -n "$1" ] && [ -f "$1" ] && printf '✅' || printf '❌'; }

          RAW_MSG="${{ steps.gitinfo.outputs.commit_msg }}"
          MSG=$(echo "$RAW_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          SHA="${{ steps.gitinfo.outputs.commit_sha }}"
          COUNT="${{ steps.commitcount.outputs.count }}"
          REF="${{ github.ref_name }}"

          CAPTION=$(printf '<b>RedefineNCM KMP</b>  ·  <code>%s</code>\n\n📝 %s\n🔖 <code>%s</code>  ·  +%s commits\n\n──────────────────\n🤖 Android  %s  APK (attached)\n🐧 Linux    %s  .deb\n🪟 Windows  %s  .msi\n🍎 macOS    %s  .dmg\n🌐 Web      %s  .zip\n\n<i>桌面端与 Web 产物见 CI artifacts。</i>' \
            "$REF" "$MSG" "$SHA" "$COUNT" \
            "$(status "$APK")" "$(status "$DEB")" "$(status "$MSI")" "$(status "$DMG")" "$(status "$WEB")")

          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"

          if [ -n "$APK" ] && [ -f "$APK" ]; then
            # Desktop packages bundle the JVM and exceed Telegram's 50 MB bot-API limit;
            # only the APK is uploaded. Desktop build status is shown in the caption text.
            CAPTION_FILE=$(mktemp)
            printf '%s' "$CAPTION" > "$CAPTION_FILE"
            curl -sS -X POST "${API}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F "document=@${APK}" \
              -F "caption=<${CAPTION_FILE}" \
              -F parse_mode=HTML
            rm -f "$CAPTION_FILE"
          else
            # No APK — text-only status message
            curl -sS -X POST "${API}/sendMessage" \
              -H 'Content-Type: application/json' \
              --data "$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$CAPTION" \
                '{"chat_id":$c,"text":$t,"parse_mode":"HTML"}')"
          fi

  # ─── GitHub Release (tag only) ──────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [ sign-android, build-web, build-desktop-linux, build-desktop-windows, build-desktop-macos ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Build changelog since last tag
        id: changelog
        run: |
          git fetch --force --tags
          mapfile -t tags < <(git tag --sort=-creatordate)
          current="${tags[0]}"
          previous="${tags[1]:-}"
          if [ -z "$previous" ]; then
            log=$(git log --oneline "$current")
            count=$(git rev-list --count "$current")
          else
            log=$(git log --oneline "${previous}..${current}")
            count=$(git rev-list --count "${previous}..${current}")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$log" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Remove unsigned verification APK
        run: rm -f dist/*unsigned*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          files: dist/**/*
          body: |
            🎉 **RedefineNCM KMP ${{ github.ref_name }}**

            📦 **${{ steps.changelog.outputs.count }} commits since last release**
            ```
            ${{ steps.changelog.outputs.log }}
            ```

            | Platform | File |
            |----------|------|
            | Android | `RedefineNCM_KMP_signed.apk` |
            | Linux | `.deb` package |
            | Windows | `.msi` installer |
            | macOS | `.dmg` image |
            | Web | `RedefineNCM_KMP_web.zip` |
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
