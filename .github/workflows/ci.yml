name: KMP CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: Tests and compile checks
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.app_version.outputs.app_version }}
      base_tag: ${{ steps.app_version.outputs.base_tag }}
      commit_hash: ${{ steps.app_version.outputs.commit_hash }}
      version_code: ${{ steps.app_version.outputs.version_code }}
      native_package_version: ${{ steps.app_version.outputs.native_package_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Resolve canonical app version
        id: app_version
        run: |
          chmod +x gradlew
          set -euo pipefail
          version_output="$(./gradlew --quiet printAppVersion)"
          read_version() {
            printf '%s\n' "$version_output" | sed -n "s/^$1=//p" | tail -n1
          }

          APP_VERSION="$(read_version versionName)"
          BASE_TAG="$(read_version baseTag)"
          COMMIT_HASH="$(read_version commitHash)"
          VERSION_CODE="$(read_version versionCode)"
          NATIVE_PACKAGE_VERSION="$(read_version nativePackageVersion)"
          test -n "$APP_VERSION"
          test -n "$BASE_TAG"
          test -n "$COMMIT_HASH"
          test -n "$VERSION_CODE"
          test -n "$NATIVE_PACKAGE_VERSION"
          if [[ "$GITHUB_REF" == refs/tags/* ]] && [ "$BASE_TAG" != "$GITHUB_REF_NAME" ]; then
            echo "Tag build '$GITHUB_REF_NAME' resolved mismatched base tag '$BASE_TAG'." >&2
            exit 1
          fi

          {
            echo "app_version=$APP_VERSION"
            echo "base_tag=$BASE_TAG"
            echo "commit_hash=$COMMIT_HASH"
            echo "version_code=$VERSION_CODE"
            echo "native_package_version=$NATIVE_PACKAGE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Reject runtime dumps and JWT credentials
        run: |
          python scripts/check_tracked_secrets.py --self-test

      - name: Run tests and compile checks
        run: |
          chmod +x gradlew
          # The Linux JVM suite contains a real MPRIS client/server smoke test.
          dbus-run-session -- ./gradlew --no-daemon :shared:jvmTest
          ./gradlew \
            :shared:testAndroidHostTest \
            :desktopApp:compileKotlin

  # ─── Android ────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    needs: test
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}
      REDEFINE_NCM_BASE_TAG: ${{ needs.test.outputs.base_tag }}
      REDEFINE_NCM_COMMIT_HASH: ${{ needs.test.outputs.commit_hash }}
      REDEFINE_NCM_VERSION_CODE: ${{ needs.test.outputs.version_code }}
      REDEFINE_NCM_VERSION_NAME: ${{ needs.test.outputs.app_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :androidApp:assembleRelease
          jq -e \
            --arg version "$APP_VERSION" \
            --argjson code "$REDEFINE_NCM_VERSION_CODE" \
            'any(.elements[]; .versionName == $version and .versionCode == $code)' \
            androidApp/build/outputs/apk/release/output-metadata.json
          source_apk=$(find androidApp/build/outputs/apk/release -name '*-unsigned.apk' -print -quit)
          test -n "$source_apk"
          cp "$source_apk" \
            "androidApp/build/outputs/apk/release/RedefineNCM_KMP-${APP_VERSION}-release-unsigned.apk"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apk-verification
          path: androidApp/build/outputs/apk/**/RedefineNCM_KMP-${{ needs.test.outputs.app_version }}-release-unsigned.apk
          if-no-files-found: error

  # ─── Web · Wasm ────────────────────────────────────────────────────────────
  build-web:
    name: Web · Wasm (tests + production bundle)
    needs: test
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}
      REDEFINE_NCM_BASE_TAG: ${{ needs.test.outputs.base_tag }}
      REDEFINE_NCM_COMMIT_HASH: ${{ needs.test.outputs.commit_hash }}
      REDEFINE_NCM_VERSION_CODE: ${{ needs.test.outputs.version_code }}
      REDEFINE_NCM_VERSION_NAME: ${{ needs.test.outputs.app_version }}
      NATIVE_PACKAGE_VERSION: ${{ needs.test.outputs.native_package_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Test and build production distribution
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon \
            :shared:wasmJsBrowserTest \
            :shared:wasmJsBrowserDistribution

      - name: Package Web distribution
        run: |
          jq -e \
            --arg version "$APP_VERSION" \
            --arg tag "$REDEFINE_NCM_BASE_TAG" \
            --arg hash "$REDEFINE_NCM_COMMIT_HASH" \
            --argjson build "$REDEFINE_NCM_VERSION_CODE" \
            --arg native "$NATIVE_PACKAGE_VERSION" \
            '.version == $version and .tag == $tag and .hash == $hash and
              .build == $build and .nativePackageVersion == $native' \
            shared/build/dist/wasmJs/productionExecutable/version.json
          mkdir -p shared/build/distributions
          (
            cd shared/build/dist/wasmJs/productionExecutable
            zip -qr "../../../distributions/RedefineNCM_KMP-${APP_VERSION}-web.zip" .
          )

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-wasm-distribution
          path: shared/build/distributions/RedefineNCM_KMP-${{ needs.test.outputs.app_version }}-web.zip
          if-no-files-found: error

  # Push builds publish an installable minified release APK; pull requests only verify unsigned release output.
  sign-android:
    name: Sign Android release
    needs: [ test, build-android ]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: android-apk-verification
          path: unsigned-apk

      - name: Prepare release APK for signing
        run: |
          source_apk=$(find unsigned-apk -name '*release-unsigned.apk' -print -quit)
          test -n "$source_apk"
          mkdir -p androidApp/build/outputs/apk/release
          cp "$source_apk" \
            "androidApp/build/outputs/apk/release/RedefineNCM_KMP-${APP_VERSION}-release-unsigned.apk"

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@349ebdef58775b1e0d8099458af0816dc79b6407 # v1
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename signed APK
        run: |
          mv "${{ steps.sign_app.outputs.signedReleaseFile }}" \
            "androidApp/build/outputs/apk/release/RedefineNCM_KMP-${APP_VERSION}.apk"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apk-signed
          path: androidApp/build/outputs/apk/release/RedefineNCM_KMP-${{ needs.test.outputs.app_version }}.apk
          if-no-files-found: error

  # ─── Desktop · Linux ────────────────────────────────────────────────────────
  build-desktop-linux:
    name: Desktop · Linux (.deb)
    needs: test
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}
      REDEFINE_NCM_BASE_TAG: ${{ needs.test.outputs.base_tag }}
      REDEFINE_NCM_COMMIT_HASH: ${{ needs.test.outputs.commit_hash }}
      REDEFINE_NCM_VERSION_CODE: ${{ needs.test.outputs.version_code }}
      REDEFINE_NCM_VERSION_NAME: ${{ needs.test.outputs.app_version }}
      NATIVE_PACKAGE_VERSION: ${{ needs.test.outputs.native_package_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .deb package
        run: |
          chmod +x gradlew
          ./gradlew :desktopApp:packageDeb
          package=$(find desktopApp/build/compose/binaries/main/deb -name '*.deb' -print -quit)
          test -n "$package"
          test "$(dpkg-deb -f "$package" Version)" = "$NATIVE_PACKAGE_VERSION"
          mv "$package" "$(dirname "$package")/RedefineNCM_KMP-${APP_VERSION}.deb"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/RedefineNCM_KMP-${{ needs.test.outputs.app_version }}.deb
          if-no-files-found: error

  # ─── Desktop · Windows ──────────────────────────────────────────────────────
  build-desktop-windows:
    name: Desktop · Windows (.msi)
    needs: test
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}
      REDEFINE_NCM_BASE_TAG: ${{ needs.test.outputs.base_tag }}
      REDEFINE_NCM_COMMIT_HASH: ${{ needs.test.outputs.commit_hash }}
      REDEFINE_NCM_VERSION_CODE: ${{ needs.test.outputs.version_code }}
      REDEFINE_NCM_VERSION_NAME: ${{ needs.test.outputs.app_version }}
      NATIVE_PACKAGE_VERSION: ${{ needs.test.outputs.native_package_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .msi installer
        run: |
          ./gradlew :shared:jvmTest :desktopApp:packageReleaseMsi
          $package = Get-ChildItem -Path desktopApp/build/compose/binaries/main-release/msi -Filter *.msi | Select-Object -First 1
          if (-not $package) { throw "MSI package was not produced." }
          $installer = $null
          $database = $null
          $view = $null
          $record = $null
          try {
            $installer = New-Object -ComObject WindowsInstaller.Installer
            $database = $installer.OpenDatabase($package.FullName, 0)
            $view = $database.OpenView("SELECT Value FROM Property WHERE Property = 'ProductVersion'")
            $view.Execute()
            $record = $view.Fetch()
            if ($null -eq $record) { throw "MSI ProductVersion is missing." }
            $actualVersion = $record.StringData(1)
          } finally {
            if ($null -ne $view) { $view.Close() }
            foreach ($comObject in @($record, $view, $database, $installer)) {
              if ($null -ne $comObject) {
                [void][Runtime.InteropServices.Marshal]::FinalReleaseComObject($comObject)
              }
            }
            [GC]::Collect()
            [GC]::WaitForPendingFinalizers()
          }
          if ($actualVersion -ne $env:NATIVE_PACKAGE_VERSION) {
            throw "MSI ProductVersion '$actualVersion' does not match '$env:NATIVE_PACKAGE_VERSION'."
          }
          $target = Join-Path $package.DirectoryName "RedefineNCM_KMP-$env:APP_VERSION.msi"
          Move-Item -LiteralPath $package.FullName -Destination $target

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-windows-msi
          path: desktopApp/build/compose/binaries/main-release/msi/RedefineNCM_KMP-${{ needs.test.outputs.app_version }}.msi
          if-no-files-found: error

  # ─── Desktop · macOS ────────────────────────────────────────────────────────
  build-desktop-macos:
    name: Desktop · macOS (.dmg)
    needs: test
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}
      REDEFINE_NCM_BASE_TAG: ${{ needs.test.outputs.base_tag }}
      REDEFINE_NCM_COMMIT_HASH: ${{ needs.test.outputs.commit_hash }}
      REDEFINE_NCM_VERSION_CODE: ${{ needs.test.outputs.version_code }}
      REDEFINE_NCM_VERSION_NAME: ${{ needs.test.outputs.app_version }}
      NATIVE_PACKAGE_VERSION: ${{ needs.test.outputs.native_package_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build .dmg image
        run: |
          chmod +x gradlew
          # jvmTest executes the native MPNowPlayingInfoCenter/remote-command smoke on macOS.
          ./gradlew :shared:jvmTest :desktopApp:packageDmg
          plist=$(find desktopApp/build/compose/binaries/main -path '*/RedefineNCM.app/Contents/Info.plist' -print -quit)
          test -n "$plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$plist")" = "$NATIVE_PACKAGE_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$plist")" = "$NATIVE_PACKAGE_VERSION"
          test "$(/usr/libexec/PlistBuddy -c 'Print :RedefineNCMVersionName' "$plist")" = "$APP_VERSION"
          package=$(find desktopApp/build/compose/binaries/main/dmg -name '*.dmg' -print -quit)
          test -n "$package"
          mv "$package" "$(dirname "$package")/RedefineNCM_KMP-${APP_VERSION}.dmg"

      - name: Upload jpackage diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-macos-jpackage-logs
          path: desktopApp/build/compose/logs/**
          if-no-files-found: ignore

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: desktop-macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/RedefineNCM_KMP-${{ needs.test.outputs.app_version }}.dmg
          if-no-files-found: error

  # ─── iOS ────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (framework + app)
    needs: test
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ needs.test.outputs.app_version }}
      REDEFINE_NCM_BASE_TAG: ${{ needs.test.outputs.base_tag }}
      REDEFINE_NCM_COMMIT_HASH: ${{ needs.test.outputs.commit_hash }}
      REDEFINE_NCM_VERSION_CODE: ${{ needs.test.outputs.version_code }}
      REDEFINE_NCM_VERSION_NAME: ${{ needs.test.outputs.app_version }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Compile iOS Simulator framework
        # Verifies iOS Kotlin compilation; produces the Shared.framework used by Xcode.
        # Full IPA signing requires Xcode provisioning and is not done in CI.
        run: ./gradlew :shared:iosSimulatorArm64Test :shared:linkReleaseFrameworkIosSimulatorArm64

      - name: Compile iOS app and Live Activity widget
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath iosApp/build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Verify iOS product versions
        run: |
          app_plist="iosApp/build/DerivedData/Build/Products/Debug-iphonesimulator/RedefineNCM_KMP.app/Info.plist"
          widget_plist="iosApp/build/DerivedData/Build/Products/Debug-iphonesimulator/RedefineNCM_KMP.app/PlugIns/LyricWidget.appex/Info.plist"
          for plist in "$app_plist" "$widget_plist"; do
            test -f "$plist"
            test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$plist")" = "${REDEFINE_NCM_BASE_TAG#v}"
            test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$plist")" = "$REDEFINE_NCM_VERSION_CODE"
            test "$(/usr/libexec/PlistBuddy -c 'Print :RedefineNCMVersionName' "$plist")" = "$APP_VERSION"
          done

  # ─── Telegram 通知（所有构建完成后汇总推送）────────────────────────────────────
  notify-telegram:
    name: Notify Telegram
    needs: [ test, build-android, sign-android, build-web, build-desktop-linux, build-desktop-windows, build-desktop-macos, build-ios ]
    if: always() && github.event_name != 'pull_request' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Count commits since last tag
        id: commitcount
        run: |
          git fetch --force --tags
          latest_tag=$(git tag --sort=-creatordate | head -n1)
          if [ -z "$latest_tag" ]; then
            count=$(git rev-list --count HEAD)
          else
            count=$(git rev-list --count "${latest_tag}..HEAD")
          fi
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: gitinfo
        run: |
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Send artifacts to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK=$(find dist/ -name "RedefineNCM_KMP-v*.apk" ! -name '*unsigned*' -print -quit)
          DEB=$(find dist/ -name "*.deb" 2>/dev/null | head -1)
          MSI=$(find dist/ -name "*.msi" 2>/dev/null | head -1)
          DMG=$(find dist/ -name "*.dmg" 2>/dev/null | head -1)
          WEB=$(find dist/ -name "RedefineNCM_KMP-v*-web.zip" 2>/dev/null | head -1)

          # Returns ✅ if the file exists, ❌ otherwise
          status() { [ -n "$1" ] && [ -f "$1" ] && printf '✅' || printf '❌'; }

          RAW_MSG="${{ steps.gitinfo.outputs.commit_msg }}"
          MSG=$(echo "$RAW_MSG" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          SHA="${{ steps.gitinfo.outputs.commit_sha }}"
          COUNT="${{ steps.commitcount.outputs.count }}"
          REF="${{ github.ref_name }}"
          VERSION="${{ needs.test.outputs.app_version }}"

          CAPTION=$(printf '<b>RedefineNCM KMP</b>  ·  <code>%s</code>\n\n📝 %s\n🔖 <code>%s</code>  ·  <code>%s</code>  ·  +%s commits\n\n──────────────────\n🤖 Android  %s  APK (attached)\n🐧 Linux    %s  .deb\n🪟 Windows  %s  .msi\n🍎 macOS    %s  .dmg\n🌐 Web      %s  .zip\n\n<i>桌面端与 Web 产物见 CI artifacts。</i>' \
            "$REF" "$MSG" "$VERSION" "$SHA" "$COUNT" \
            "$(status "$APK")" "$(status "$DEB")" "$(status "$MSI")" "$(status "$DMG")" "$(status "$WEB")")

          API="https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}"

          if [ -n "$APK" ] && [ -f "$APK" ]; then
            # Desktop packages bundle the JVM and exceed Telegram's 50 MB bot-API limit;
            # only the APK is uploaded. Desktop build status is shown in the caption text.
            CAPTION_FILE=$(mktemp)
            printf '%s' "$CAPTION" > "$CAPTION_FILE"
            curl -sS -X POST "${API}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F "document=@${APK}" \
              -F "caption=<${CAPTION_FILE}" \
              -F parse_mode=HTML
            rm -f "$CAPTION_FILE"
          else
            # No APK — text-only status message
            curl -sS -X POST "${API}/sendMessage" \
              -H 'Content-Type: application/json' \
              --data "$(jq -n --arg c "$TELEGRAM_CHAT_ID" --arg t "$CAPTION" \
                '{"chat_id":$c,"text":$t,"parse_mode":"HTML"}')"
          fi

  # ─── GitHub Release (tag only) ──────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [ test, sign-android, build-web, build-desktop-linux, build-desktop-windows, build-desktop-macos, build-ios ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Build changelog since last tag
        id: changelog
        run: |
          git fetch --force --tags
          current="${{ github.ref_name }}"
          previous=$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 "${current}^" 2>/dev/null || true)
          if [ -z "$previous" ]; then
            log=$(git log --oneline "$current")
            count=$(git rev-list --count "$current")
          else
            log=$(git log --oneline "${previous}..${current}")
            count=$(git rev-list --count "${previous}..${current}")
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$log" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist/
          merge-multiple: true

      - name: Remove unsigned verification APK
        run: rm -f dist/*unsigned*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ needs.test.outputs.app_version }}"
          files: dist/**/*
          body: |
            🎉 **RedefineNCM KMP ${{ needs.test.outputs.app_version }}**

            📦 **${{ steps.changelog.outputs.count }} commits since last release**
            ```
            ${{ steps.changelog.outputs.log }}
            ```

            | Platform | File |
            |----------|------|
            | Android | `RedefineNCM_KMP-${{ needs.test.outputs.app_version }}.apk` |
