name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count commits since last tag
        id: commitcount
        run: |
          git fetch --tags
          latest_tag=$(git tag --sort=-creatordate | head -n1)
          if [ -z "$latest_tag" ]; then
            count=$(git rev-list --count HEAD)
          else
            count=$(git rev-list --count ${latest_tag}..HEAD)
          fi
          echo "count=$count" >> $GITHUB_OUTPUT

      - name: Get commit info
        id: gitinfo
        run: |
          echo "commit_msg=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Notify Telegram - Build Started
        id: tg_notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG="${{ steps.gitinfo.outputs.commit_msg }}"
          COMMIT_SHA="${{ steps.gitinfo.outputs.commit_sha }}"
          COMMIT_COUNT="${{ steps.commitcount.outputs.count }}"
          VERSION_NAME="${{ github.ref_name }}"

          CAPTION=$(printf '⏳ RedefineNCM KMP: %s\n\n📝 %s [%s]\n\n📦 Commits since last tag: %s\n🔨 Building...' \
            "$VERSION_NAME" "$COMMIT_MSG" "$COMMIT_SHA" "$COMMIT_COUNT")

          printf 'building' > /tmp/building.txt
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument" \
            -F chat_id="$TELEGRAM_CHAT_ID" \
            -F document=@/tmp/building.txt \
            -F caption="$CAPTION")

          echo "Telegram response: $RESPONSE"
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')
          echo "message_id=$MESSAGE_ID" >> $GITHUB_OUTPUT

      - name: Build APK
        run: ./gradlew :androidApp:assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: androidApp/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename Signed APK
        run: mv ${{ steps.sign_app.outputs.signedReleaseFile }} androidApp/build/outputs/apk/release/RedefineNCM-KMP_signed.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RedefineNCM-KMP_${{ github.ref_name }}_${{ steps.gitinfo.outputs.commit_sha }}
          path: androidApp/build/outputs/apk/release/RedefineNCM-KMP_signed.apk

      - name: Notify Telegram - Build Complete
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE_ID="${{ steps.tg_notify.outputs.message_id }}"
          if [ -z "$MESSAGE_ID" ] || [ "$MESSAGE_ID" = "null" ]; then
            echo "No valid message_id to edit, skipping"
            exit 0
          fi

          COMMIT_MSG="${{ steps.gitinfo.outputs.commit_msg }}"
          COMMIT_SHA="${{ steps.gitinfo.outputs.commit_sha }}"
          COMMIT_COUNT="${{ steps.commitcount.outputs.count }}"
          VERSION_NAME="${{ github.ref_name }}"
          APK_FILE="androidApp/build/outputs/apk/release/RedefineNCM-KMP_signed.apk"

          if [ "${{ steps.sign_app.outcome }}" = "success" ] && [ -f "$APK_FILE" ]; then
            CAPTION=$(printf '✅ RedefineNCM KMP: %s\n\n📝 %s [%s]\n\n📦 Commits since last tag: %s' \
              "$VERSION_NAME" "$COMMIT_MSG" "$COMMIT_SHA" "$COMMIT_COUNT")

            MEDIA_JSON=$(jq -nc --arg caption "$CAPTION" \
              '{"type":"document","media":"attach://apk","caption":$caption}')

            echo "Editing Telegram message with APK..."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/editMessageMedia" \
              -F chat_id="$TELEGRAM_CHAT_ID" \
              -F message_id="$MESSAGE_ID" \
              -F media="$MEDIA_JSON" \
              -F apk=@"$APK_FILE"
          else
            TEXT=$(printf '❌ RedefineNCM KMP build failed: %s\n\n📝 %s [%s]\n\n🔗 %s/%s/actions/runs/%s' \
              "$VERSION_NAME" "$COMMIT_MSG" "$COMMIT_SHA" \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")

            echo "Editing Telegram message with failure notice..."
            curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/editMessageText" \
              -H "Content-Type: application/json" \
              -d "$(jq -nc \
                --argjson message_id "$MESSAGE_ID" \
                --arg chat_id "$TELEGRAM_CHAT_ID" \
                --arg text "$TEXT" \
                '{chat_id:$chat_id,message_id:$message_id,text:$text}')"
          fi
