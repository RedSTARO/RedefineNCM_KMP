<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>AMLL Lyric Player</title>
<script>
(function () {
  var match = location.search.match(/[?&]platform=([^&]+)/);
  if (match) document.documentElement.setAttribute("data-platform", decodeURIComponent(match[1]));
})();
</script>
<!-- AMLL core stylesheet — REQUIRED for the lyric player to render visibly. -->
<link rel="stylesheet" href="style.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; min-height: 100%; overflow: hidden; background: #0a0a0a;
    /* Keep an explicit cross-platform CJK font stack for stable lyric metrics. */
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  /* Blurred album-art background. AMLL's lyric rendering (plus-lighter blend) is designed to
     sit over a bright, blurred cover — not plain black — so the cover goes here.
     (WebView2/Chromium 的 GPU 合成下全屏 blur 无压力。) */
  #bg {
    position: absolute; inset: -8%;
    background-size: cover; background-position: center;
    filter: blur(48px) brightness(0.55) saturate(1.3);
    transform: scale(1.1);
    z-index: 0;
    transition: background-image 0.4s ease;
  }
  #dynamic-bg {
    position: absolute; inset: -8%;
    width: 116%; height: 116%;
    object-fit: cover;
    filter: blur(48px) brightness(0.55) saturate(1.3);
    transform: scale(1.1);
    opacity: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #dynamic-bg.visible { opacity: 1; }
  #bg-scrim {
    position: fixed; inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.62), rgba(0,0,0,0.56));
    z-index: 0;
    pointer-events: none;
  }
  #amll-root {
    position: fixed; inset: 0; width: 100%; height: 100%; min-height: 100%; z-index: 1;
  }
  .amll-lyric-player {
    width: 100% !important; height: 100% !important;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  html[data-platform="android"] .amll-lyric-player.dom {
    --amll-lp-line-width-aspect: .72;
    --amll-lp-line-padding-x: clamp(26px, 7.2vw, 54px);
  }
  html[data-platform="android"] #bg {
    inset: -5%;
    filter: blur(24px) brightness(0.46) saturate(1.15);
    transform: scale(1.06);
  }
  html[data-platform="android"] #dynamic-bg {
    inset: -5%;
    width: 110%; height: 110%;
    filter: blur(24px) brightness(0.46) saturate(1.15);
    transform: scale(1.06);
  }
  html[data-platform="android"] .amll-lyric-player {
    /* Match AMLL's .75em interlude-dot inset; the line's -.2em margin is cancelled below. */
    --lyric-line-padding-x: .75em;
    mix-blend-mode: normal !important;
    color: rgba(255,255,255,0.94);
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  html[data-platform="android"] .FmKaba_lyricLineWrapper {
    will-change: transform, opacity;
  }
  html[data-platform="android"] .FmKaba_lyricLineWrapper,
  html[data-platform="android"] .FmKaba_lyricLine,
  html[data-platform="android"] .FmKaba_lyricMainLine > span {
    backface-visibility: hidden;
    transform: translateZ(0);
  }
  html[data-platform="android"] .FmKaba_lyricLine {
    padding: .42em .2em;
  }
  .FmKaba_lyricLine,
  .FmKaba_lyricLineWrapper,
  [data-amll-rendered-line] {
    cursor: pointer;
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_lyricMainLine {
    line-height: 1.08;
    text-wrap: balance;
    overflow-wrap: normal;
    word-break: normal;
    line-break: loose;
  }
  .FmKaba_lyricLine .FmKaba_lyricMainLine {
    color: rgb(205,205,205);
  }
  .FmKaba_lyricLine .FmKaba_lyricSubLine {
    color: rgb(225,225,225);
    opacity: 1 !important;
  }
  .FmKaba_lyricBgLine,
  .FmKaba_lyricBgLine.FmKaba_active {
    opacity: .88;
  }
  .FmKaba_lyricLine.FmKaba_active {
    --bright-mask-alpha: 1 !important;
    --dark-mask-alpha: 0.14 !important;
  }
  .FmKaba_lyricLine.FmKaba_active .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.98);
    text-shadow:
      0 0 10px rgba(255,255,255,0.35),
      0 4px 24px rgba(0,0,0,0.35);
  }
  .FmKaba_lyricLine.FmKaba_active .FmKaba_wordBody {
    color: inherit;
    -webkit-text-stroke: 0;
    text-shadow: inherit;
    filter: none;
  }
  .FmKaba_lyricLine .FmKaba_emphasize .FmKaba_wordBody,
  .FmKaba_lyricLine .FmKaba_wordBody.FmKaba_emphasize {
    color: rgba(255,255,255,0.98);
    -webkit-text-stroke: 0.55px rgba(255,255,255,0.58);
    text-shadow:
      0 0 3px rgba(255,255,255,1),
      0 0 14px rgba(226,214,255,0.95),
      0 0 30px rgba(165,126,255,0.62);
    filter: drop-shadow(0 0 10px rgba(190,160,255,0.52));
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active .FmKaba_wordBody {
    color: inherit;
    -webkit-text-stroke: 0;
    text-shadow: inherit;
    filter: none;
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_lyricMainLine {
    color: rgb(205,205,205);
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active {
    --bright-mask-alpha: 1 !important;
    --dark-mask-alpha: 0.12 !important;
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.98);
    text-shadow:
      0 0 10px rgba(255,255,255,0.38),
      0 4px 24px rgba(0,0,0,0.35);
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_emphasize .FmKaba_wordBody,
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_wordBody.FmKaba_emphasize {
    color: rgba(255,255,255,0.96);
    -webkit-text-stroke: 0.45px rgba(255,255,255,0.52);
    text-shadow:
      0 0 3px rgba(255,255,255,0.98),
      0 0 10px rgba(226,214,255,0.82),
      0 0 22px rgba(165,126,255,0.50);
    filter: drop-shadow(0 0 7px rgba(190,160,255,0.42));
  }
  [data-amll-rendered-line]:focus-visible {
    outline: 3px solid rgba(255,255,255,0.92);
    outline-offset: 2px;
    border-radius: 12px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      scroll-behavior: auto !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6);
    font-family: system-ui, sans-serif; font-size: 14px;
    z-index: 10; pointer-events: none;
  }
  html:not([data-platform="desktop"]) .desktop-control {
    display: none !important;
  }
  .desktop-control {
    position: fixed;
    z-index: 30;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  #desktop-back {
    left: 18px;
    top: 18px;
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 999px;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.94);
    background: rgba(24,25,25,0.72);
    box-shadow: 0 10px 28px rgba(0,0,0,0.24);
    cursor: pointer;
    font-size: 32px;
    line-height: 1;
  }
  [hidden] { display: none !important; }
  #wiki-info {
    position: fixed;
    top: calc(18px + env(safe-area-inset-top, 0px));
    right: calc(18px + env(safe-area-inset-right, 0px));
    z-index: 40;
    width: 48px;
    height: 48px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.92);
    background: transparent;
    box-shadow: none;
    cursor: pointer;
  }
  #wiki-info:hover { background: rgba(255,255,255,0.10); }
  #wiki-info:focus-visible,
  #wiki-close:focus-visible,
  .wiki-retry:focus-visible {
    outline: 3px solid rgba(255,255,255,0.92);
    outline-offset: 2px;
  }
  .wiki-more-icon {
    font: 700 30px/1 "Segoe UI Symbol", "Noto Sans Symbols", sans-serif;
    transform: translateY(-1px);
  }
  #wiki-overlay {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: grid;
    place-items: center;
    padding:
      calc(18px + env(safe-area-inset-top, 0px))
      calc(18px + env(safe-area-inset-right, 0px))
      calc(18px + env(safe-area-inset-bottom, 0px))
      calc(18px + env(safe-area-inset-left, 0px));
    background: rgba(0,0,0,0.58);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #wiki-dialog {
    width: min(580px, 100%);
    max-height: min(82vh, 760px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: rgba(255,255,255,0.94);
    background: rgba(27,28,29,0.96);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 28px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.48);
  }
  .wiki-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    padding: 24px 24px 16px;
  }
  .wiki-header h2 { font-size: 22px; line-height: 1.25; }
  .wiki-header p {
    margin-top: 6px;
    color: rgba(255,255,255,0.60);
    font-size: 13px;
  }
  #wiki-close {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: 999px;
    color: rgba(255,255,255,0.92);
    background: rgba(255,255,255,0.10);
    font-size: 25px;
    line-height: 1;
    cursor: pointer;
  }
  #wiki-content {
    overflow: auto;
    overscroll-behavior: contain;
    padding: 0 24px 24px;
  }
  .wiki-status {
    min-height: 132px;
    display: grid;
    place-items: center;
    gap: 14px;
    color: rgba(255,255,255,0.72);
    text-align: center;
    line-height: 1.55;
  }
  .wiki-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(255,255,255,0.18);
    border-top-color: rgba(255,255,255,0.88);
    border-radius: 50%;
    animation: wiki-spin 0.8s linear infinite;
  }
  @keyframes wiki-spin { to { transform: rotate(360deg); } }
  .wiki-retry {
    border: 0;
    border-radius: 999px;
    padding: 10px 18px;
    color: #171717;
    background: rgba(255,255,255,0.92);
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .wiki-section {
    padding: 17px 0;
    border-top: 1px solid rgba(255,255,255,0.10);
  }
  .wiki-section:first-child { border-top: 0; }
  .wiki-section h3 {
    margin-bottom: 10px;
    color: rgba(255,255,255,0.66);
    font-size: 13px;
    font-weight: 600;
  }
  .wiki-values { display: flex; flex-wrap: wrap; gap: 8px; }
  .wiki-value {
    padding: 7px 11px;
    border-radius: 999px;
    color: rgba(255,255,255,0.92);
    background: rgba(255,255,255,0.10);
    font-size: 14px;
    line-height: 1.35;
  }
  .wiki-description {
    color: rgba(255,255,255,0.84);
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
  }
  .wiki-values + .wiki-description { margin-top: 12px; }
  @media (max-width: 520px) {
    #wiki-info { right: 12px; }
    #wiki-dialog { border-radius: 24px; }
    .wiki-header { padding: 20px 20px 14px; }
    #wiki-content { padding: 0 20px 20px; }
  }
</style>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<video id="dynamic-bg" aria-hidden="true" muted autoplay loop playsinline preload="auto"></video>
<div id="bg-scrim" aria-hidden="true"></div>
<div id="loading" role="status" aria-live="polite">正在加载歌词组件…</div>
<div id="amll-root" role="region" aria-label="歌词"></div>
<button id="desktop-back" class="desktop-control" type="button" aria-label="返回">‹</button>
<button id="wiki-info" type="button" aria-label="详细信息" aria-haspopup="dialog" aria-controls="wiki-overlay">
  <span class="wiki-more-icon" aria-hidden="true">⋮</span>
</button>
<div id="wiki-overlay" hidden>
  <section id="wiki-dialog" role="dialog" aria-modal="true" aria-labelledby="wiki-title">
    <header class="wiki-header">
      <div>
        <h2 id="wiki-title">音乐百科 - 简要信息</h2>
        <p>当前歌曲</p>
      </div>
      <button id="wiki-close" type="button" aria-label="关闭详细信息">×</button>
    </header>
    <div id="wiki-content" aria-live="polite"></div>
  </section>
</div>

<script>
// Surface any failure on-screen (and to the host console) so a blank panel becomes a
// readable error on both Android WebView and desktop WebView2, not just black.
let errored = false;
function showError(msg) {
  errored = true;
  const el = document.getElementById("loading");
  if (el) {
    el.style.color = "#ff8a8a";
    el.style.whiteSpace = "pre-wrap";
    el.style.padding = "16px";
    el.style.fontSize = "12px";
    el.textContent = "歌词组件加载失败\n" + msg;
  }
  console.error("AMLL error:", msg);
}
// Breadcrumb so the user can see how far load got (overwritten unless an error stuck).
function setStatus(s) {
  if (errored) return;
  const el = document.getElementById("loading");
  if (el) el.textContent = s;
  console.log("AMLL status:", s);
}
function hideLoading() {
  const el = document.getElementById("loading");
  if (el) el.remove();
}
function applyViewportSize() {
  const viewport = window.visualViewport;
  const width = Math.max(
    1,
    Math.round((viewport && viewport.width) || window.innerWidth || document.documentElement.clientWidth || screen.width || 0),
  );
  const height = Math.max(
    1,
    Math.round((viewport && viewport.height) || window.innerHeight || document.documentElement.clientHeight || screen.height || 0),
  );
  const widthPx = width + "px";
  const heightPx = height + "px";
  [
    document.documentElement,
    document.body,
    document.getElementById("amll-root"),
    document.querySelector(".amll-lyric-player"),
  ].forEach(function (el) {
    if (!el) return;
    el.style.width = widthPx;
    el.style.height = heightPx;
    el.style.minHeight = heightPx;
  });
  [document.getElementById("bg"), document.getElementById("dynamic-bg")].forEach(function (bg) {
    if (!bg) return;
    const overscanX = Math.ceil(width * 0.1);
    const overscanY = Math.ceil(height * 0.1);
    bg.style.position = "fixed";
    bg.style.left = -overscanX + "px";
    bg.style.top = -overscanY + "px";
    bg.style.right = "auto";
    bg.style.bottom = "auto";
    bg.style.width = width + overscanX * 2 + "px";
    bg.style.height = height + overscanY * 2 + "px";
    bg.style.minHeight = height + overscanY * 2 + "px";
  });
}

let songWikiState = { kind: "idle" };
let songWikiReturnFocus = null;

function createWikiElement(tagName, className, text) {
  const element = document.createElement(tagName);
  if (className) element.className = className;
  if (text != null) element.textContent = String(text);
  return element;
}

function renderSongWiki() {
  const content = document.getElementById("wiki-content");
  if (!content) return;
  content.replaceChildren();

  if (songWikiState.kind === "loading" || songWikiState.kind === "idle") {
    const status = createWikiElement("div", "wiki-status");
    status.appendChild(createWikiElement("span", "wiki-spinner"));
    status.appendChild(createWikiElement("span", "", "正在加载音乐百科…"));
    content.appendChild(status);
    return;
  }
  if (songWikiState.kind === "error") {
    const status = createWikiElement("div", "wiki-status");
    status.appendChild(createWikiElement("span", "", songWikiState.message || "音乐百科加载失败"));
    const retry = createWikiElement("button", "wiki-retry", "重试");
    retry.type = "button";
    retry.addEventListener("click", requestSongWiki);
    status.appendChild(retry);
    content.appendChild(status);
    return;
  }
  if (songWikiState.kind === "empty") {
    content.appendChild(createWikiElement("div", "wiki-status", "暂无音乐百科简要信息"));
    return;
  }

  const sections = Array.isArray(songWikiState.summary && songWikiState.summary.sections)
    ? songWikiState.summary.sections
    : [];
  sections.forEach(function (section) {
    if (!section || !String(section.title || "").trim()) return;
    const item = createWikiElement("section", "wiki-section");
    item.appendChild(createWikiElement("h3", "", String(section.title).trim()));
    const values = Array.isArray(section.values)
      ? section.values.map(String).map((value) => value.trim()).filter(Boolean)
      : [];
    if (values.length) {
      const valueList = createWikiElement("div", "wiki-values");
      values.forEach((value) => valueList.appendChild(createWikiElement("span", "wiki-value", value)));
      item.appendChild(valueList);
    }
    const description = String(section.description || "").trim();
    if (description) item.appendChild(createWikiElement("p", "wiki-description", description));
    content.appendChild(item);
  });
  if (!content.childElementCount) {
    content.appendChild(createWikiElement("div", "wiki-status", "暂无音乐百科简要信息"));
  }
}

function requestSongWiki() {
  songWikiState = { kind: "loading" };
  renderSongWiki();
  if (globalThis.AmllCallback && globalThis.AmllCallback.onSongWikiRequested) {
    globalThis.AmllCallback.onSongWikiRequested();
  } else if (typeof globalThis.amllSongWikiRequested === "function") {
    globalThis.amllSongWikiRequested();
  } else {
    setSongWikiError("无法连接应用数据服务");
  }
}

function openSongWiki() {
  const overlay = document.getElementById("wiki-overlay");
  if (!overlay) return;
  songWikiReturnFocus = document.activeElement;
  overlay.hidden = false;
  renderSongWiki();
  document.getElementById("wiki-close")?.focus();
  if (songWikiState.kind === "idle") requestSongWiki();
}

function closeSongWiki(restoreFocus = true) {
  const overlay = document.getElementById("wiki-overlay");
  if (!overlay || overlay.hidden) return;
  overlay.hidden = true;
  if (restoreFocus && songWikiReturnFocus && typeof songWikiReturnFocus.focus === "function") {
    songWikiReturnFocus.focus();
  }
}

function resetSongWiki() {
  songWikiState = { kind: "idle" };
  closeSongWiki(false);
  renderSongWiki();
}

function setSongWikiLoading() {
  songWikiState = { kind: "loading" };
  renderSongWiki();
}

function setSongWikiSummary(payload) {
  let summary = payload;
  if (typeof summary === "string") {
    try { summary = JSON.parse(summary); } catch (_) { summary = null; }
  }
  if (!summary || !Array.isArray(summary.sections) || !summary.sections.length) {
    setSongWikiEmpty();
    return;
  }
  songWikiState = { kind: "content", summary };
  renderSongWiki();
}

function setSongWikiEmpty() {
  songWikiState = { kind: "empty" };
  renderSongWiki();
}

function setSongWikiError(message) {
  songWikiState = { kind: "error", message: String(message || "音乐百科加载失败") };
  renderSongWiki();
}

function initSongWikiControls() {
  document.getElementById("wiki-info")?.addEventListener("click", function (event) {
    event.stopPropagation();
    openSongWiki();
  });
  document.getElementById("wiki-close")?.addEventListener("click", function () {
    closeSongWiki();
  });
  document.getElementById("wiki-overlay")?.addEventListener("click", function (event) {
    if (event.target === event.currentTarget) closeSongWiki();
  });
  document.addEventListener("keydown", function (event) {
    if (event.key === "Escape" && !document.getElementById("wiki-overlay")?.hidden) {
      closeSongWiki();
      event.preventDefault();
    }
  });
}

function clearDynamicCover() {
  const video = document.getElementById("dynamic-bg");
  if (!video) return;
  video.classList.remove("visible");
  video.dataset.source = "";
  video.onloadeddata = null;
  video.onerror = null;
  video.pause();
  video.removeAttribute("src");
  video.load();
}

function setDynamicCover(url) {
  const source = String(url || "").trim();
  if (!/^https?:\/\//i.test(source)) {
    clearDynamicCover();
    return;
  }
  const video = document.getElementById("dynamic-bg");
  if (!video) return;
  if (video.dataset.source === source) return;
  clearDynamicCover();
  video.dataset.source = source;
  video.onloadeddata = function () {
    if (video.dataset.source !== source) return;
    const playback = video.play();
    if (playback && typeof playback.catch === "function") {
      playback.catch(function () {
        if (video.dataset.source === source) video.classList.remove("visible");
      });
    }
    video.classList.add("visible");
  };
  video.onerror = function () {
    if (video.dataset.source === source) clearDynamicCover();
  };
  video.src = source;
  video.load();
}

globalThis.AmllPage = {
  setStatus,
  showError,
  hideLoading,
  applyViewportSize,
  resetSongWiki,
  setSongWikiLoading,
  setSongWikiSummary,
  setSongWikiEmpty,
  setSongWikiError,
  setDynamicCover,
  clearDynamicCover,
};
applyViewportSize();
requestAnimationFrame(applyViewportSize);
window.addEventListener("resize", applyViewportSize);
if (window.visualViewport) window.visualViewport.addEventListener("resize", applyViewportSize);
window.addEventListener("error", function (e) {
  showError((e.message || e.error || "unknown") + (e.filename ? "\n@ " + e.filename + ":" + e.lineno : ""));
});
window.addEventListener("unhandledrejection", function (e) {
  showError("promise rejected: " + ((e.reason && e.reason.message) || e.reason));
});
window.addEventListener("DOMContentLoaded", function () {
  initDesktopControls();
  initSongWikiControls();
});

let currentLyricLines = [];
let currentLyricMediaId = "";
let lyricClickSeekingInstalled = false;
let reducedMotionPreferenceInstalled = false;

function normalizeMediaId(mediaId) {
  return mediaId == null ? "" : String(mediaId);
}

function callDesktopHost(name) {
  const fn = globalThis[name];
  if (typeof fn === "function") {
    fn();
  }
}

function initDesktopControls() {
  if (document.documentElement.getAttribute("data-platform") !== "desktop") return;
  const back = document.getElementById("desktop-back");
  back && back.addEventListener("click", (event) => {
    event.stopPropagation();
    callDesktopHost("amllBack");
  });
}

function setCurrentLyricLines(lines, mediaId) {
  if (mediaId !== undefined) currentLyricMediaId = normalizeMediaId(mediaId);
  currentLyricLines = Array.isArray(lines) ? lines : [];
  currentLyricLines.forEach(function (line) {
    if (line && currentLyricMediaId) line.mediaId = currentLyricMediaId;
  });
  if (globalThis.__amllDebug) globalThis.__amllDebug.lines = currentLyricLines.length;
}

function notifyHostLyricLineClicked(timeMs, mediaId) {
  const safeTime = Math.max(0, Math.round(Number(timeMs) || 0));
  const safeMediaId = normalizeMediaId(mediaId || currentLyricMediaId);
  if (globalThis.AmllCallback && globalThis.AmllCallback.onLyricLineClicked) {
    globalThis.AmllCallback.onLyricLineClicked(safeTime, safeMediaId);
  } else if (typeof globalThis.amllSeek === "function") {
    globalThis.amllSeek(safeTime, safeMediaId);
  }
}

function collectLyricLineElements() {
  const root = document.getElementById("amll-root");
  if (!root) return [];
  const selectorGroups = [
    ".FmKaba_lyricLineWrapper",
    "[class*='lyricLineWrapper']",
    ".FmKaba_lyricLine",
    "[class*='lyricLine']",
  ];
  for (const selector of selectorGroups) {
    const elements = Array.from(root.querySelectorAll(selector))
      .filter((element) => {
        const rect = element.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0 && element.textContent.trim().length > 0;
      });
    if (elements.length > 0) return elements;
  }
  return [];
}

function tagRenderedLyricLines() {
  const elements = collectLyricLineElements();
  const activeIndex = elements.findIndex((element) =>
    element.classList.contains("FmKaba_active") || Boolean(element.querySelector(".FmKaba_active"))
  );
  elements.forEach((element, index) => {
    element.dataset.amllRenderedLine = String(index);
    element.setAttribute("role", "button");
    element.tabIndex = index === (activeIndex >= 0 ? activeIndex : 0) ? 0 : -1;
    const readableText = element.textContent.trim();
    element.setAttribute("aria-label", readableText ? `跳转到歌词：${readableText}` : "跳转到这句歌词");
    const isActive = element.classList.contains("FmKaba_active") ||
      Boolean(element.querySelector(".FmKaba_active"));
    if (isActive) element.setAttribute("aria-current", "true");
    else element.removeAttribute("aria-current");
  });
}

function scheduleLyricLineTagging() {
  requestAnimationFrame(() => {
    tagRenderedLyricLines();
    requestAnimationFrame(tagRenderedLyricLines);
  });
}

function installLyricClickSeeking() {
  if (lyricClickSeekingInstalled) return;
  const root = document.getElementById("amll-root");
  const player = globalThis.AmllBridge && globalThis.AmllBridge.player;
  if (!root || !player) return;
  lyricClickSeekingInstalled = true;
  player.addEventListener("line-click", function (event) {
    const index = Number(event.lineIndex);
    const lineData = Number.isInteger(index) ? currentLyricLines[index] : null;
    const stableLineData = lineData || event.line;
    const time = Number(stableLineData && stableLineData.startTime);
    if (!Number.isFinite(time)) return;
    notifyHostLyricLineClicked(time, lineData && lineData.mediaId);
  });
  root.addEventListener("keydown", function (event) {
    if (["ArrowUp", "ArrowDown", "Home", "End"].includes(event.key)) {
      const elements = collectLyricLineElements();
      if (!elements.length) return;
      const target = event.target && event.target.closest
        ? event.target.closest("[data-amll-rendered-line]")
        : null;
      const renderedIndex = target ? elements.indexOf(target) : -1;
      const currentIndex = renderedIndex >= 0 ? renderedIndex : 0;
      const nextIndex = event.key === "Home"
        ? 0
        : event.key === "End"
          ? elements.length - 1
          : Math.max(0, Math.min(elements.length - 1, currentIndex + (event.key === "ArrowDown" ? 1 : -1)));
      elements.forEach((element, index) => { element.tabIndex = index === nextIndex ? 0 : -1; });
      elements[nextIndex].focus();
      event.preventDefault();
      return;
    }
    if (event.key !== "Enter" && event.key !== " ") return;
    const target = event.target && event.target.closest
      ? event.target.closest("[data-amll-rendered-line]")
      : null;
    if (!target || !root.contains(target)) return;
    target.click();
    event.preventDefault();
  }, true);
  const lyricObserver = new MutationObserver(scheduleLyricLineTagging);
  lyricObserver.observe(root, {
    subtree: true,
    childList: true,
    attributes: true,
    attributeFilter: ["class"],
  });
}

function installReducedMotionPreference() {
  if (reducedMotionPreferenceInstalled || typeof globalThis.matchMedia !== "function") return;
  const player = globalThis.AmllBridge && globalThis.AmllBridge.player;
  if (!player || typeof player.setEnableSpring !== "function") return;
  reducedMotionPreferenceInstalled = true;
  const preference = globalThis.matchMedia("(prefers-reduced-motion: reduce)");
  const applyPreference = function () {
    player.setEnableSpring(!preference.matches);
  };
  if (typeof preference.addEventListener === "function") {
    preference.addEventListener("change", applyPreference);
  } else if (typeof preference.addListener === "function") {
    preference.addListener(applyPreference);
  }
  applyPreference();
}

function parseLrcSupplement(lrcText) {
  const entries = [];
  const timeRegex = /\[(\d+):(\d+(?:\.\d+)?)\]/g;
  for (const rawLine of String(lrcText || "").split(/\r?\n/)) {
    if (!rawLine || rawLine.trim().startsWith("{")) continue;
    const matches = Array.from(rawLine.matchAll(timeRegex));
    if (!matches.length) continue;
    const text = rawLine.replace(timeRegex, "").trim();
    if (!text) continue;
    matches.forEach(function (match) {
      const minutes = Number(match[1]) || 0;
      const seconds = Number(match[2]) || 0;
      entries.push({ time: Math.round((minutes * 60 + seconds) * 1000), text });
    });
  }
  return entries.sort(function (a, b) { return a.time - b.time; });
}

function nearestSupplement(entries, timeMs) {
  if (!entries || !entries.length) return "";
  let best = null;
  let bestDistance = Number.MAX_VALUE;
  entries.forEach(function (entry) {
    const distance = Math.abs(entry.time - timeMs);
    if (distance <= 850 && distance < bestDistance) {
      best = entry;
      bestDistance = distance;
    }
  });
  return best ? best.text : "";
}

function applyLyricOptions(lines, options) {
  const opts = options || {};
  const translations = opts.showTranslation ? parseLrcSupplement(opts.translatedLyric) : [];
  const romans = opts.showRoman ? parseLrcSupplement(opts.romanLyric) : [];
  return (Array.isArray(lines) ? lines : []).map(function (line) {
    const next = Object.assign({}, line);
    const translation = nearestSupplement(translations, next.startTime);
    if (translation) next.translatedLyric = translation;
    const roman = nearestSupplement(romans, next.startTime);
    if (roman) next.romanLyric = roman;
    return next;
  });
}

function installWordLyricSupport() {
  const bridge = globalThis.AmllBridge;
  if (!bridge) return;
  installLyricClickSeeking();
  installReducedMotionPreference();

  if (!bridge.__redefineLoadLyricsWrapped && bridge.loadLyrics) {
    bridge.__redefineLoadLyricsWrapped = true;
    bridge.loadLyrics = function (lrcText, mediaId, options) {
      if (!this.player) return;
      const parsed = this.parseLrc ? this.parseLrc(lrcText) : [];
      const lines = applyLyricOptions(parsed, options);
      setCurrentLyricLines(lines, mediaId);
      this.player.setLyricLines(lines);
      scheduleLyricLineTagging();
      globalThis.AmllPage && globalThis.AmllPage.hideLoading();
    };
  }

  bridge.resetTrack = function (mediaId) {
    currentLyricMediaId = normalizeMediaId(mediaId);
    setCurrentLyricLines([], currentLyricMediaId);
    this.player?.setLyricLines([]);
  };

  if (bridge.__redefineWordLyricWrapped) return;
  bridge.__redefineWordLyricWrapped = true;
  bridge.loadWordLyrics = function (yrcText, mediaId, options) {
    if (!this.player) return;
    const parsed = this.parseYrc ? this.parseYrc(yrcText) : [];
    const primaryLines = parsed.length ? parsed : (this.parseLrc ? this.parseLrc(yrcText) : []);
    const lines = applyLyricOptions(primaryLines, options);
    setCurrentLyricLines(lines, mediaId);
    this.player.setLyricLines(lines);
    scheduleLyricLineTagging();
    globalThis.AmllPage && globalThis.AmllPage.hideLoading();
  };
}
globalThis.installWordLyricSupport = installWordLyricSupport;

// Signal "engine mounted" to the host. Android exposes a @JavascriptInterface named
// AmllCallback; desktop WebView2 exposes a bound amllReady function.
function signalReady() {
  if (globalThis.AmllCallback && globalThis.AmllCallback.onReady) {
    globalThis.AmllCallback.onReady();            // Android @JavascriptInterface
  } else if (typeof globalThis.amllReady === "function") {
    globalThis.amllReady();                       // desktop webview_java (WebView2) bind
  } else {
  showError("无法连接应用播放控制");
  }
}

// The lyric engine is part of the signed application. Fail fast when that asset is
// absent or incompatible instead of executing mutable remote code inside a native bridge.
async function loadEngine() {
  // Load the locally bundled engine as a CLASSIC script. Android WebView blocks
  // dynamic import()/module scripts over file:// (opaque origin → CORS failure),
  // but a classic <script src> loads fine. The bundle sets globalThis.AmllBridge.
  setStatus("正在加载本地歌词组件…");
  const localOk = await new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = "bundle.js";
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
  if (!localOk) {
    showError("应用内置歌词组件缺失");
    return;
  }
  setStatus("本地组件已就绪，正在启动歌词引擎…");
  try {
    applyViewportSize();
    if (globalThis.AmllBridge && globalThis.AmllBridge.init()) {
      applyViewportSize();
      installWordLyricSupport();
      setStatus("正在等待歌词…");
      signalReady();
      return;
    }
    showError("应用内置歌词组件初始化失败");
  } catch (e) {
    showError("本地歌词组件启动异常：" + (e && e.message ? e.message : e));
  }
}

loadEngine();
</script>
