<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>AMLL Lyric Player</title>
<script>
(function () {
  var match = location.search.match(/[?&]platform=([^&]+)/);
  if (match) document.documentElement.setAttribute("data-platform", decodeURIComponent(match[1]));
})();
</script>
<!-- AMLL core stylesheet — REQUIRED for the lyric player to render visibly. -->
<link rel="stylesheet" href="style.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; min-height: 100%; overflow: hidden; background: #0a0a0a;
    /* Keep an explicit cross-platform CJK font stack for stable lyric metrics. */
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  /* Blurred album-art background. AMLL's lyric rendering (plus-lighter blend) is designed to
     sit over a bright, blurred cover — not plain black — so the cover goes here.
     (WebView2/Chromium 的 GPU 合成下全屏 blur 无压力。) */
  #bg {
    position: absolute; inset: -8%;
    background-size: cover; background-position: center;
    filter: blur(48px) brightness(0.55) saturate(1.3);
    transform: scale(1.1);
    z-index: 0;
    transition: background-image 0.4s ease;
  }
  #dynamic-bg {
    position: absolute; inset: -8%;
    width: 116%; height: 116%;
    object-fit: cover;
    filter: blur(48px) brightness(0.55) saturate(1.3);
    transform: scale(1.1);
    opacity: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #dynamic-bg.visible { opacity: 1; }
  #bg-scrim {
    position: fixed; inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.62), rgba(0,0,0,0.56));
    z-index: 0;
    pointer-events: none;
  }
  #amll-root {
    position: fixed; inset: 0; width: 100%; height: 100%; min-height: 100%; z-index: 1;
  }
  .amll-lyric-player {
    width: 100% !important; height: 100% !important;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  html[data-platform="android"] .amll-lyric-player.dom {
    --amll-lp-line-width-aspect: .72;
    --amll-lp-line-padding-x: clamp(26px, 7.2vw, 54px);
  }
  html[data-platform="android"] #bg {
    inset: -5%;
    filter: blur(24px) brightness(0.46) saturate(1.15);
    transform: scale(1.06);
  }
  html[data-platform="android"] #dynamic-bg {
    inset: -5%;
    width: 110%; height: 110%;
    filter: blur(24px) brightness(0.46) saturate(1.15);
    transform: scale(1.06);
  }
  html[data-platform="android"] .amll-lyric-player {
    /* Match AMLL's .75em interlude-dot inset; the line's -.2em margin is cancelled below. */
    --lyric-line-padding-x: .75em;
    mix-blend-mode: normal !important;
    color: rgba(255,255,255,0.94);
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  html[data-platform="android"] .FmKaba_lyricLineWrapper {
    will-change: transform, opacity;
  }
  html[data-platform="android"] .FmKaba_lyricLineWrapper,
  html[data-platform="android"] .FmKaba_lyricLine,
  html[data-platform="android"] .FmKaba_lyricMainLine > span {
    backface-visibility: hidden;
    transform: translateZ(0);
  }
  html[data-platform="android"] .FmKaba_lyricLine {
    padding: .42em .2em;
  }
  .FmKaba_lyricLine,
  .FmKaba_lyricLineWrapper,
  [data-amll-rendered-line] {
    cursor: pointer;
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_lyricMainLine {
    line-height: 1.08;
    text-wrap: balance;
    overflow-wrap: normal;
    word-break: normal;
    line-break: loose;
  }
  .FmKaba_lyricLine .FmKaba_lyricMainLine {
    color: rgb(205,205,205);
  }
  .FmKaba_lyricLine .FmKaba_lyricSubLine {
    color: rgb(225,225,225);
    opacity: 1 !important;
  }
  .FmKaba_lyricBgLine,
  .FmKaba_lyricBgLine.FmKaba_active {
    opacity: .88;
  }
  .FmKaba_lyricLine.FmKaba_active {
    --bright-mask-alpha: 1 !important;
    --dark-mask-alpha: 0.14 !important;
  }
  .FmKaba_lyricLine.FmKaba_active .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.98);
    text-shadow:
      0 0 10px rgba(255,255,255,0.35),
      0 4px 24px rgba(0,0,0,0.35);
  }
  .FmKaba_lyricLine.FmKaba_active .FmKaba_wordBody {
    color: inherit;
    -webkit-text-stroke: 0;
    text-shadow: inherit;
    filter: none;
  }
  .FmKaba_lyricLine .FmKaba_emphasize .FmKaba_wordBody,
  .FmKaba_lyricLine .FmKaba_wordBody.FmKaba_emphasize {
    color: rgba(255,255,255,0.98);
    -webkit-text-stroke: 0.55px rgba(255,255,255,0.58);
    text-shadow:
      0 0 3px rgba(255,255,255,1),
      0 0 14px rgba(226,214,255,0.95),
      0 0 30px rgba(165,126,255,0.62);
    filter: drop-shadow(0 0 10px rgba(190,160,255,0.52));
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active .FmKaba_wordBody {
    color: inherit;
    -webkit-text-stroke: 0;
    text-shadow: inherit;
    filter: none;
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_lyricMainLine {
    color: rgb(205,205,205);
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active {
    --bright-mask-alpha: 1 !important;
    --dark-mask-alpha: 0.12 !important;
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.98);
    text-shadow:
      0 0 10px rgba(255,255,255,0.38),
      0 4px 24px rgba(0,0,0,0.35);
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_emphasize .FmKaba_wordBody,
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_wordBody.FmKaba_emphasize {
    color: rgba(255,255,255,0.96);
    -webkit-text-stroke: 0.45px rgba(255,255,255,0.52);
    text-shadow:
      0 0 3px rgba(255,255,255,0.98),
      0 0 10px rgba(226,214,255,0.82),
      0 0 22px rgba(165,126,255,0.50);
    filter: drop-shadow(0 0 7px rgba(190,160,255,0.42));
  }
  [data-amll-rendered-line]:focus-visible {
    outline: 3px solid rgba(255,255,255,0.92);
    outline-offset: 2px;
    border-radius: 12px;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      scroll-behavior: auto !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6);
    font-family: system-ui, sans-serif; font-size: 14px;
    z-index: 10; pointer-events: none;
  }
  html:not([data-platform="desktop"]) .desktop-control {
    display: none !important;
  }
  .desktop-control {
    position: fixed;
    z-index: 30;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  #desktop-back {
    left: 18px;
    top: 18px;
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 999px;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.94);
    background: rgba(24,25,25,0.72);
    box-shadow: 0 10px 28px rgba(0,0,0,0.24);
    cursor: pointer;
    font-size: 32px;
    line-height: 1;
  }
  [hidden] { display: none !important; }
  :root {
    --wiki-primary: #80d8c5;
    --wiki-on-primary: #00382f;
    --wiki-primary-container: #005144;
    --wiki-on-primary-container: #9cf2dc;
    --wiki-surface: #101410;
    --wiki-surface-container: #1d211e;
    --wiki-surface-container-high: #282c29;
    --wiki-surface-container-highest: #333733;
    --wiki-on-surface: #e1e5de;
    --wiki-on-surface-variant: #c0c9c2;
    --wiki-outline: #8a938b;
    --wiki-error: #f2b8b5;
    --wiki-error-container: #8c1d18;
    --wiki-on-error-container: #f9dedc;
  }
  #wiki-info {
    position: fixed;
    top: calc(18px + env(safe-area-inset-top, 0px));
    right: calc(18px + env(safe-area-inset-right, 0px));
    z-index: 40;
    width: 48px;
    height: 48px;
    padding: 0;
    border: 0;
    border-radius: 50%;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.94);
    background: transparent;
    box-shadow: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 160ms ease, transform 220ms cubic-bezier(.2,.8,.2,1);
  }
  #wiki-info:hover { background: rgba(255,255,255,0.12); }
  #wiki-info:active { transform: scale(0.90); }
  #wiki-info:disabled { opacity: 0.38; cursor: default; transform: none; }
  html[data-platform="android"] #wiki-info { display: none; }
  #wiki-info:focus-visible,
  #wiki-close:focus-visible,
  .wiki-retry:focus-visible {
    outline: 3px solid rgba(255,255,255,0.92);
    outline-offset: 2px;
  }
  .wiki-info-icon,
  .wiki-close-icon {
    width: 24px;
    height: 24px;
    display: block;
    fill: currentColor;
  }
  #wiki-overlay {
    position: fixed;
    inset: 0;
    z-index: 60;
    display: grid;
    place-items: center;
    padding:
      calc(18px + env(safe-area-inset-top, 0px))
      calc(18px + env(safe-area-inset-right, 0px))
      calc(18px + env(safe-area-inset-bottom, 0px))
      calc(18px + env(safe-area-inset-left, 0px));
    background: rgba(0,0,0,0.64);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease;
  }
  #wiki-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  #wiki-dialog {
    width: min(720px, 100%);
    max-height: min(86vh, 820px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: var(--wiki-on-surface);
    background: var(--wiki-surface);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 36px;
    box-shadow: 0 28px 96px rgba(0,0,0,0.56);
    transform: translateY(24px) scale(0.94);
    opacity: 0;
    transition:
      transform 280ms cubic-bezier(.2,.8,.2,1),
      opacity 180ms ease;
  }
  #wiki-overlay.open #wiki-dialog {
    transform: translateY(0) scale(1);
    opacity: 1;
  }
  .wiki-hero {
    position: relative;
    display: grid;
    grid-template-columns: 144px minmax(0, 1fr) 48px;
    align-items: center;
    gap: 24px;
    padding: 24px;
    background:
      radial-gradient(circle at 18% 12%, rgba(128,216,197,0.20), transparent 44%),
      linear-gradient(135deg, var(--wiki-surface-container-highest), var(--wiki-surface-container));
  }
  .wiki-artwork {
    position: relative;
    width: 144px;
    height: 144px;
    overflow: hidden;
    border-radius: 32px;
    color: var(--wiki-on-surface-variant);
    background: var(--wiki-surface-container-highest);
    box-shadow: 0 14px 32px rgba(0,0,0,0.28);
  }
  .wiki-artwork-placeholder {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
  }
  .wiki-artwork-placeholder svg {
    width: 38px;
    height: 38px;
    fill: currentColor;
    opacity: 0.72;
  }
  #wiki-cover-image,
  #wiki-cover-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 220ms ease;
  }
  #wiki-cover-image.visible,
  #wiki-cover-video.visible { opacity: 1; }
  #wiki-cover-video { z-index: 2; }
  #wiki-cover-badge {
    position: absolute;
    right: 8px;
    bottom: 8px;
    z-index: 3;
    padding: 6px 10px;
    border-radius: 999px;
    color: var(--wiki-on-primary-container);
    background: rgba(0,81,68,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .02em;
  }
  .wiki-heading { min-width: 0; }
  .wiki-kicker {
    margin-bottom: 8px;
    color: var(--wiki-primary);
    font-size: 12px;
    font-weight: 750;
    letter-spacing: .08em;
  }
  .wiki-heading h2 {
    overflow: hidden;
    color: var(--wiki-on-surface);
    font-size: clamp(25px, 4vw, 36px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -.025em;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wiki-song-artist,
  .wiki-song-album {
    overflow: hidden;
    color: var(--wiki-on-surface-variant);
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .wiki-song-artist {
    margin-top: 10px;
    font-size: 15px;
    font-weight: 600;
  }
  .wiki-song-album {
    margin-top: 5px;
    font-size: 13px;
  }
  #wiki-close {
    align-self: start;
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 999px;
    display: grid;
    place-items: center;
    color: var(--wiki-on-surface-variant);
    background: var(--wiki-surface-container-highest);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 160ms ease, transform 220ms cubic-bezier(.2,.8,.2,1);
  }
  #wiki-close:hover { background: rgba(128,216,197,0.18); }
  #wiki-close:active { transform: scale(0.90); }
  .wiki-content-label {
    padding: 22px 24px 10px;
    color: var(--wiki-on-surface-variant);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .04em;
  }
  #wiki-content {
    overflow: auto;
    overscroll-behavior: contain;
    display: flex;
    flex-direction: column;
    gap: 1.5px;
    padding: 0 24px 28px;
    scrollbar-color: var(--wiki-outline) transparent;
  }
  .wiki-status {
    min-height: 164px;
    display: grid;
    place-items: center;
    gap: 14px;
    padding: 28px;
    border-radius: 28px;
    color: var(--wiki-on-surface-variant);
    background: var(--wiki-surface-container-high);
    text-align: center;
    line-height: 1.55;
  }
  .wiki-status-error {
    color: var(--wiki-on-error-container);
    background: var(--wiki-error-container);
  }
  .wiki-state-icon {
    width: 40px;
    height: 40px;
    border: 2px solid currentColor;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 19px;
    font-weight: 800;
    line-height: 1;
  }
  .wiki-state-title {
    color: inherit;
    font-size: 18px;
    line-height: 1.3;
  }
  .wiki-state-message {
    max-width: 420px;
    color: inherit;
    opacity: .84;
    font-size: 14px;
  }
  .wiki-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(128,216,197,0.20);
    border-top-color: var(--wiki-primary);
    border-radius: 50%;
    animation: wiki-spin 0.8s linear infinite;
  }
  @keyframes wiki-spin { to { transform: rotate(360deg); } }
  .wiki-retry {
    min-width: 96px;
    min-height: 48px;
    border: 0;
    border-radius: 999px;
    padding: 10px 18px;
    color: var(--wiki-on-primary);
    background: var(--wiki-primary);
    font: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 220ms cubic-bezier(.2,.8,.2,1), filter 160ms ease;
  }
  .wiki-retry:hover { filter: brightness(1.06); }
  .wiki-retry:active { transform: scale(0.95); }
  .wiki-section {
    padding: 18px 20px;
    border-radius: 6px;
    background: var(--wiki-surface-container-high);
    overflow-wrap: anywhere;
  }
  .wiki-section:first-child {
    border-radius: 28px 28px 6px 6px;
  }
  .wiki-section:last-child {
    border-radius: 6px 6px 28px 28px;
  }
  .wiki-section:only-child { border-radius: 28px; }
  .wiki-section h3 {
    margin-bottom: 12px;
    color: var(--wiki-on-surface);
    font-size: 16px;
    font-weight: 750;
    line-height: 1.3;
  }
  .wiki-values { display: flex; flex-wrap: wrap; gap: 8px; }
  .wiki-value {
    padding: 7px 12px;
    border-radius: 999px;
    color: var(--wiki-on-primary-container);
    background: var(--wiki-primary-container);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.35;
  }
  .wiki-description {
    color: var(--wiki-on-surface-variant);
    font-size: 14px;
    line-height: 1.72;
    white-space: pre-wrap;
  }
  .wiki-values + .wiki-description { margin-top: 12px; }
  @media (max-width: 600px) {
    #wiki-info { right: 12px; }
    #wiki-overlay {
      place-items: end center;
      padding:
        calc(48px + env(safe-area-inset-top, 0px))
        0
        0;
    }
    #wiki-dialog {
      width: 100%;
      max-height: calc(100dvh - 48px - env(safe-area-inset-top, 0px));
      border-width: 1px 0 0;
      border-radius: 32px 32px 0 0;
      transform: translateY(48px) scale(0.98);
    }
    .wiki-hero {
      grid-template-columns: 108px minmax(0, 1fr);
      gap: 18px;
      padding: 20px;
    }
    .wiki-artwork { width: 108px; height: 108px; border-radius: 26px; }
    .wiki-heading { padding-right: 44px; }
    .wiki-heading h2 { font-size: clamp(23px, 7vw, 30px); }
    #wiki-close { position: absolute; top: 16px; right: 16px; }
    .wiki-content-label { padding: 20px 20px 10px; }
    #wiki-content {
      padding:
        0 16px
        calc(20px + env(safe-area-inset-bottom, 0px));
    }
  }
  @media (max-height: 560px) and (min-width: 601px) {
    #wiki-overlay { padding-block: 10px; }
    #wiki-dialog { max-height: calc(100dvh - 20px); }
    .wiki-hero {
      grid-template-columns: 96px minmax(0, 1fr) 48px;
      gap: 18px;
      padding: 18px 20px;
    }
    .wiki-artwork { width: 96px; height: 96px; border-radius: 24px; }
    .wiki-content-label { padding-top: 16px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .wiki-spinner {
      animation: none;
      border-color: rgba(128,216,197,0.35);
      border-top-color: var(--wiki-primary);
    }
  }
  @media (prefers-contrast: more) {
    #wiki-dialog,
    .wiki-section,
    .wiki-status { border: 1px solid var(--wiki-outline); }
  }
  @media (forced-colors: active) {
    #wiki-overlay { background: rgba(0,0,0,.72); backdrop-filter: none; }
    #wiki-dialog,
    .wiki-section,
    .wiki-status,
    #wiki-close,
    .wiki-value,
    .wiki-retry {
      border: 1px solid CanvasText;
      color: CanvasText;
      background: Canvas;
      forced-color-adjust: none;
    }
  }
</style>
</head>
<body>
<div id="bg" aria-hidden="true"></div>
<video id="dynamic-bg" aria-hidden="true" muted autoplay loop playsinline preload="auto"></video>
<div id="bg-scrim" aria-hidden="true"></div>
<div id="loading" role="status" aria-live="polite">正在加载歌词组件…</div>
<div id="amll-root" role="region" aria-label="歌词"></div>
<button id="desktop-back" class="desktop-control" type="button" aria-label="返回">‹</button>
<button id="wiki-info" type="button" aria-label="详细信息" aria-haspopup="dialog" aria-controls="wiki-dialog" aria-expanded="false" disabled>
  <svg class="wiki-info-icon" viewBox="0 -960 960 960" aria-hidden="true">
    <path d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Z" />
  </svg>
</button>
<div id="wiki-overlay" hidden>
  <section id="wiki-dialog" role="dialog" aria-modal="true" aria-labelledby="wiki-title" aria-describedby="wiki-song-artist">
    <header class="wiki-hero">
      <div class="wiki-artwork">
        <div class="wiki-artwork-placeholder" aria-hidden="true">
          <svg viewBox="0 -960 960 960">
            <path d="M400-120q-50 0-85-35t-35-85q0-50 35-85t85-35q23 0 43.5 8.5T480-328v-392h320v240H560v240q0 50-35 85t-85 35h-40Z" />
          </svg>
        </div>
        <img id="wiki-cover-image" alt="" />
        <video id="wiki-cover-video" aria-hidden="true" muted loop playsinline preload="metadata"></video>
        <span id="wiki-cover-badge" hidden>动态封面</span>
      </div>
      <div class="wiki-heading">
        <p class="wiki-kicker">音乐百科 · 简要信息</p>
        <h2 id="wiki-title">当前歌曲</h2>
        <p id="wiki-song-artist" class="wiki-song-artist">歌曲信息</p>
        <p id="wiki-song-album" class="wiki-song-album" hidden></p>
      </div>
      <button id="wiki-close" type="button" aria-label="关闭详细信息">
        <svg class="wiki-close-icon" viewBox="0 -960 960 960" aria-hidden="true">
          <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
        </svg>
      </button>
    </header>
    <p class="wiki-content-label">歌曲档案</p>
    <div id="wiki-content"></div>
  </section>
</div>

<script>
// Surface any failure on-screen (and to the host console) so a blank panel becomes a
// readable error on both Android WebView and desktop WebView2, not just black.
let errored = false;
function showError(msg) {
  errored = true;
  const el = document.getElementById("loading");
  if (el) {
    el.style.color = "#ff8a8a";
    el.style.whiteSpace = "pre-wrap";
    el.style.padding = "16px";
    el.style.fontSize = "12px";
    el.textContent = "歌词组件加载失败\n" + msg;
  }
  console.error("AMLL error:", msg);
}
// Breadcrumb so the user can see how far load got (overwritten unless an error stuck).
function setStatus(s) {
  if (errored) return;
  const el = document.getElementById("loading");
  if (el) el.textContent = s;
  console.log("AMLL status:", s);
}
function hideLoading() {
  const el = document.getElementById("loading");
  if (el) el.remove();
}
function applyViewportSize() {
  const viewport = window.visualViewport;
  const width = Math.max(
    1,
    Math.round((viewport && viewport.width) || window.innerWidth || document.documentElement.clientWidth || screen.width || 0),
  );
  const height = Math.max(
    1,
    Math.round((viewport && viewport.height) || window.innerHeight || document.documentElement.clientHeight || screen.height || 0),
  );
  const widthPx = width + "px";
  const heightPx = height + "px";
  [
    document.documentElement,
    document.body,
    document.getElementById("amll-root"),
    document.querySelector(".amll-lyric-player"),
  ].forEach(function (el) {
    if (!el) return;
    el.style.width = widthPx;
    el.style.height = heightPx;
    el.style.minHeight = heightPx;
  });
  [document.getElementById("bg"), document.getElementById("dynamic-bg")].forEach(function (bg) {
    if (!bg) return;
    const overscanX = Math.ceil(width * 0.1);
    const overscanY = Math.ceil(height * 0.1);
    bg.style.position = "fixed";
    bg.style.left = -overscanX + "px";
    bg.style.top = -overscanY + "px";
    bg.style.right = "auto";
    bg.style.bottom = "auto";
    bg.style.width = width + overscanX * 2 + "px";
    bg.style.height = height + overscanY * 2 + "px";
    bg.style.minHeight = height + overscanY * 2 + "px";
  });
}

let songDetailsState = {
  mediaId: "",
  title: "",
  artist: "",
  albumTitle: "",
  artworkUri: "",
};
let songWikiState = { kind: "idle", mediaId: "" };
let songWikiReturnFocus = null;
let songWikiCloseTimer = 0;
let songWikiOpenGeneration = 0;
let dynamicBackgroundSuppressed = false;

function createWikiElement(tagName, className, text) {
  const element = document.createElement(tagName);
  if (className) element.className = className;
  if (text != null) element.textContent = String(text);
  return element;
}

function parseSongDetailsPayload(payload) {
  let details = payload;
  if (typeof details === "string") {
    try { details = JSON.parse(details); } catch (_) { details = null; }
  }
  if (!details || typeof details !== "object") details = {};
  return {
    mediaId: normalizeMediaId(details.mediaId),
    title: String(details.title || "").trim(),
    artist: String(details.artist || "").trim(),
    albumTitle: String(details.albumTitle || "").trim(),
    artworkUri: String(details.artworkUri || "").trim(),
  };
}

function setWikiText(id, value, fallback = "") {
  const element = document.getElementById(id);
  if (!element) return;
  const text = String(value || "").trim();
  element.textContent = text || fallback;
  if (id !== "wiki-title") element.hidden = !text && !fallback;
}

function setSongDetails(payload) {
  const next = parseSongDetailsPayload(payload);
  const mediaChanged = next.mediaId !== songDetailsState.mediaId;
  const artworkChanged = next.artworkUri !== songDetailsState.artworkUri;
  const wikiWasOpen = isSongWikiOpen();
  if (mediaChanged) {
    clearDynamicCover();
    closeSongWiki(false);
  }
  songDetailsState = next;
  if (mediaChanged) {
    songWikiState = { kind: "idle", mediaId: next.mediaId };
    renderSongWiki();
  }

  const infoButton = document.getElementById("wiki-info");
  if (infoButton) infoButton.disabled = !next.mediaId;
  if (mediaChanged && wikiWasOpen) {
    const focusTarget = next.mediaId ? infoButton : document.getElementById("desktop-back");
    focusTarget?.focus();
  }
  setWikiText("wiki-title", next.title, "当前歌曲");
  setWikiText("wiki-song-artist", next.artist, "歌曲信息");
  setWikiText("wiki-song-album", next.albumTitle);

  const image = document.getElementById("wiki-cover-image");
  if (!image) return;
  image.alt = next.title ? `${next.title} 的专辑封面` : "专辑封面";
  if (!artworkChanged) return;
  image.classList.remove("visible");
  image.onload = null;
  image.onerror = null;
  image.removeAttribute("src");
  const background = document.getElementById("bg");
  if (background) {
    if (next.artworkUri) background.style.backgroundImage = `url(${JSON.stringify(next.artworkUri)})`;
    else background.style.removeProperty("background-image");
  }
  if (!next.artworkUri) return;
  const expectedArtwork = next.artworkUri;
  image.onload = function () {
    if (songDetailsState.artworkUri === expectedArtwork) image.classList.add("visible");
  };
  image.onerror = function () {
    if (songDetailsState.artworkUri === expectedArtwork) image.classList.remove("visible");
  };
  image.src = expectedArtwork;
}

function isCurrentSongWikiMedia(mediaId) {
  return normalizeMediaId(mediaId) === songDetailsState.mediaId && Boolean(songDetailsState.mediaId);
}

function createWikiStatePanel(kind, title, message) {
  const status = createWikiElement("div", `wiki-status wiki-status-${kind}`);
  const icon = createWikiElement("span", "wiki-state-icon", kind === "error" ? "!" : "i");
  icon.setAttribute("aria-hidden", "true");
  status.appendChild(icon);
  status.appendChild(createWikiElement("strong", "wiki-state-title", title));
  if (message) status.appendChild(createWikiElement("span", "wiki-state-message", message));
  return status;
}

function renderSongWiki() {
  const content = document.getElementById("wiki-content");
  if (!content) return;
  content.replaceChildren();
  content.removeAttribute("aria-busy");

  if (songWikiState.kind === "loading" || songWikiState.kind === "idle") {
    const status = createWikiElement("div", "wiki-status");
    status.setAttribute("role", "status");
    status.setAttribute("aria-live", "polite");
    content.setAttribute("aria-busy", "true");
    const spinner = createWikiElement("span", "wiki-spinner");
    spinner.setAttribute("aria-hidden", "true");
    status.appendChild(spinner);
    status.appendChild(createWikiElement("span", "", "正在加载音乐百科…"));
    content.appendChild(status);
    return;
  }
  if (songWikiState.kind === "error") {
    const status = createWikiStatePanel(
      "error",
      "音乐百科加载失败",
      songWikiState.message || "请检查网络后重试",
    );
    status.setAttribute("role", "alert");
    const retry = createWikiElement("button", "wiki-retry", "重试");
    retry.type = "button";
    retry.addEventListener("click", requestSongWiki);
    status.appendChild(retry);
    content.appendChild(status);
    return;
  }
  if (songWikiState.kind === "empty") {
    const status = createWikiStatePanel(
      "empty",
      "暂无简要信息",
      "这首歌曲暂未提供音乐百科内容",
    );
    status.setAttribute("role", "status");
    status.setAttribute("aria-live", "polite");
    content.appendChild(status);
    return;
  }

  const sections = Array.isArray(songWikiState.summary && songWikiState.summary.sections)
    ? songWikiState.summary.sections
    : [];
  sections.forEach(function (section) {
    if (!section || !String(section.title || "").trim()) return;
    const item = createWikiElement("section", "wiki-section");
    item.appendChild(createWikiElement("h3", "", String(section.title).trim()));
    const values = Array.isArray(section.values)
      ? section.values.map(String).map((value) => value.trim()).filter(Boolean)
      : [];
    if (values.length) {
      const valueList = createWikiElement("div", "wiki-values");
      values.forEach((value) => valueList.appendChild(createWikiElement("span", "wiki-value", value)));
      item.appendChild(valueList);
    }
    const description = String(section.description || "").trim();
    if (description) item.appendChild(createWikiElement("p", "wiki-description", description));
    content.appendChild(item);
  });
  if (!content.childElementCount) {
    const status = createWikiStatePanel(
      "empty",
      "暂无简要信息",
      "这首歌曲暂未提供音乐百科内容",
    );
    content.appendChild(status);
  }
}

function requestSongWiki() {
  const mediaId = songDetailsState.mediaId;
  if (!mediaId) {
    setSongWikiError("当前没有正在播放的歌曲", mediaId);
    return;
  }
  songWikiState = { kind: "loading", mediaId };
  renderSongWiki();
  if (globalThis.AmllCallback && globalThis.AmllCallback.onSongWikiRequested) {
    globalThis.AmllCallback.onSongWikiRequested(mediaId);
  } else if (typeof globalThis.amllSongWikiRequested === "function") {
    globalThis.amllSongWikiRequested(mediaId);
  } else {
    setSongWikiError("无法连接应用数据服务", mediaId);
  }
}

function setSongWikiBackgroundInert(inert) {
  ["amll-root", "desktop-back", "wiki-info"].forEach(function (id) {
    const element = document.getElementById(id);
    if (element) element.inert = inert;
  });
}

function openSongWiki() {
  const overlay = document.getElementById("wiki-overlay");
  if (!overlay || !songDetailsState.mediaId) return;
  const openGeneration = ++songWikiOpenGeneration;
  if (songWikiCloseTimer) {
    clearTimeout(songWikiCloseTimer);
    songWikiCloseTimer = 0;
  }
  songWikiReturnFocus = document.activeElement;
  overlay.hidden = false;
  document.getElementById("wiki-info")?.setAttribute("aria-expanded", "true");
  setSongWikiBackgroundInert(true);
  renderSongWiki();
  requestAnimationFrame(function () {
    if (openGeneration !== songWikiOpenGeneration || overlay.hidden) return;
    overlay.classList.add("open");
    document.getElementById("wiki-close")?.focus();
    playWikiDynamicCover();
  });
  if (songWikiState.kind === "idle") requestSongWiki();
}

function closeSongWiki(restoreFocus = true) {
  songWikiOpenGeneration += 1;
  const overlay = document.getElementById("wiki-overlay");
  if (!overlay || overlay.hidden) return;
  if (songWikiCloseTimer) {
    clearTimeout(songWikiCloseTimer);
    songWikiCloseTimer = 0;
  }
  overlay.classList.remove("open");
  document.getElementById("wiki-info")?.setAttribute("aria-expanded", "false");
  setSongWikiBackgroundInert(false);
  pauseWikiDynamicCover();
  const finishClose = function () {
    overlay.hidden = true;
    songWikiCloseTimer = 0;
  };
  const reduceMotion = typeof globalThis.matchMedia === "function" &&
    globalThis.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (reduceMotion) finishClose();
  else songWikiCloseTimer = setTimeout(finishClose, 180);
  if (restoreFocus && songWikiReturnFocus && typeof songWikiReturnFocus.focus === "function") {
    songWikiReturnFocus.focus();
  }
}

function resetSongWiki() {
  songWikiState = { kind: "idle", mediaId: songDetailsState.mediaId };
  closeSongWiki(false);
  renderSongWiki();
}

function setSongWikiLoading(mediaId) {
  if (!isCurrentSongWikiMedia(mediaId)) return;
  songWikiState = { kind: "loading", mediaId: normalizeMediaId(mediaId) };
  renderSongWiki();
}

function setSongWikiSummary(payload, mediaId) {
  if (!isCurrentSongWikiMedia(mediaId)) return;
  let summary = payload;
  if (typeof summary === "string") {
    try { summary = JSON.parse(summary); } catch (_) { summary = null; }
  }
  if (!summary || !Array.isArray(summary.sections) || !summary.sections.length) {
    setSongWikiEmpty(mediaId);
    return;
  }
  songWikiState = { kind: "content", mediaId: normalizeMediaId(mediaId), summary };
  renderSongWiki();
}

function setSongWikiEmpty(mediaId) {
  if (!isCurrentSongWikiMedia(mediaId)) return;
  songWikiState = { kind: "empty", mediaId: normalizeMediaId(mediaId) };
  renderSongWiki();
}

function setSongWikiError(message, mediaId) {
  if (!isCurrentSongWikiMedia(mediaId)) return;
  songWikiState = {
    kind: "error",
    mediaId: normalizeMediaId(mediaId),
    message: String(message || "音乐百科加载失败"),
  };
  renderSongWiki();
}

function initSongWikiControls() {
  document.getElementById("wiki-info")?.addEventListener("click", function (event) {
    event.stopPropagation();
    openSongWiki();
  });
  document.getElementById("wiki-close")?.addEventListener("click", function () {
    closeSongWiki();
  });
  document.getElementById("wiki-overlay")?.addEventListener("click", function (event) {
    if (event.target === event.currentTarget) closeSongWiki();
  });
  document.addEventListener("keydown", function (event) {
    const overlay = document.getElementById("wiki-overlay");
    if (!overlay || overlay.hidden) return;
    if (event.key === "Escape") {
      closeSongWiki();
      event.preventDefault();
      return;
    }
    if (event.key === "Tab") {
      const focusable = Array.from(
        document.getElementById("wiki-dialog")?.querySelectorAll(
          'button:not([disabled]), [href], input:not([disabled]), [tabindex]:not([tabindex="-1"])',
        ) || [],
      ).filter((element) => !element.hidden && element.getClientRects().length > 0);
      if (!focusable.length) {
        event.preventDefault();
        return;
      }
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (event.shiftKey && document.activeElement === first) {
        last.focus();
        event.preventDefault();
      } else if (!event.shiftKey && document.activeElement === last) {
        first.focus();
        event.preventDefault();
      }
    }
  });
}

function resetDynamicVideo(video) {
  if (!video) return;
  video.classList.remove("visible");
  video.dataset.source = "";
  video.onloadeddata = null;
  video.onerror = null;
  video.pause();
  video.removeAttribute("src");
  video.load();
}

function isSongWikiOpen() {
  const overlay = document.getElementById("wiki-overlay");
  return Boolean(overlay && !overlay.hidden && overlay.classList.contains("open"));
}

function clearDynamicCover(mediaId) {
  if (mediaId != null && !isCurrentSongWikiMedia(mediaId)) return;
  resetDynamicVideo(document.getElementById("dynamic-bg"));
  resetDynamicVideo(document.getElementById("wiki-cover-video"));
  const badge = document.getElementById("wiki-cover-badge");
  if (badge) badge.hidden = true;
}

function playDynamicBackground() {
  const video = document.getElementById("dynamic-bg");
  if (!video || !video.dataset.source || dynamicBackgroundSuppressed) return;
  const source = video.dataset.source;
  const detailVideo = document.getElementById("wiki-cover-video");
  if (
    isSongWikiOpen() &&
    detailVideo?.dataset.source === source &&
    detailVideo.classList.contains("visible") &&
    !detailVideo.paused
  ) return;
  const reveal = function () {
    if (video.dataset.source === source) video.classList.add("visible");
  };
  const playback = video.play();
  if (playback && typeof playback.then === "function") {
    playback.then(reveal).catch(function () {
      if (video.dataset.source === source) video.classList.remove("visible");
    });
  } else {
    reveal();
  }
}

function setDynamicBackgroundSuppressed(suppressed) {
  dynamicBackgroundSuppressed = Boolean(suppressed);
  const video = document.getElementById("dynamic-bg");
  if (dynamicBackgroundSuppressed) video?.pause();
  else playDynamicBackground();
}

function playWikiDynamicCover() {
  const video = document.getElementById("wiki-cover-video");
  if (!video || !video.dataset.source) return;
  const source = video.dataset.source;
  const playback = video.play();
  const reveal = function () {
    if (video.dataset.source !== source || !isSongWikiOpen()) return;
    video.classList.add("visible");
    document.getElementById("dynamic-bg")?.pause();
    const badge = document.getElementById("wiki-cover-badge");
    if (badge) badge.hidden = false;
  };
  if (playback && typeof playback.then === "function") {
    playback.then(reveal).catch(function () {
      if (video.dataset.source === source) video.classList.remove("visible");
    });
  } else {
    reveal();
  }
}

function pauseWikiDynamicCover() {
  const video = document.getElementById("wiki-cover-video");
  if (video) {
    video.pause();
    video.classList.remove("visible");
  }
  const badge = document.getElementById("wiki-cover-badge");
  if (badge) badge.hidden = true;
  playDynamicBackground();
}

function setDynamicCover(url, mediaId) {
  if (!isCurrentSongWikiMedia(mediaId)) return;
  const source = String(url || "").trim();
  if (!/^https?:\/\//i.test(source)) {
    clearDynamicCover(mediaId);
    return;
  }
  const backgroundVideo = document.getElementById("dynamic-bg");
  const detailVideo = document.getElementById("wiki-cover-video");
  if (!backgroundVideo) return;
  const usesHtmlSongWiki = document.documentElement.dataset.platform === "desktop";
  if (
    backgroundVideo.dataset.source === source &&
    (!usesHtmlSongWiki || detailVideo?.dataset.source === source)
  ) {
    if (usesHtmlSongWiki && isSongWikiOpen()) playWikiDynamicCover();
    return;
  }
  clearDynamicCover(mediaId);

  backgroundVideo.dataset.source = source;
  backgroundVideo.onloadeddata = function () {
    if (backgroundVideo.dataset.source !== source) return;
    playDynamicBackground();
  };
  backgroundVideo.onerror = function () {
    if (backgroundVideo.dataset.source === source) clearDynamicCover(mediaId);
  };
  backgroundVideo.src = source;
  backgroundVideo.load();

  if (!usesHtmlSongWiki || !detailVideo) return;
  detailVideo.dataset.source = source;
  detailVideo.onloadeddata = function () {
    if (detailVideo.dataset.source === source && isSongWikiOpen()) {
      playWikiDynamicCover();
    }
  };
  detailVideo.onerror = function () {
    if (detailVideo.dataset.source !== source) return;
    resetDynamicVideo(detailVideo);
    const badge = document.getElementById("wiki-cover-badge");
    if (badge) badge.hidden = true;
    playDynamicBackground();
  };
  detailVideo.src = source;
  detailVideo.load();
}

globalThis.AmllPage = {
  setStatus,
  showError,
  hideLoading,
  applyViewportSize,
  setSongDetails,
  openSongWiki,
  closeSongWiki,
  resetSongWiki,
  setSongWikiLoading,
  setSongWikiSummary,
  setSongWikiEmpty,
  setSongWikiError,
  setDynamicCover,
  clearDynamicCover,
  setDynamicBackgroundSuppressed,
};
applyViewportSize();
requestAnimationFrame(applyViewportSize);
window.addEventListener("resize", applyViewportSize);
if (window.visualViewport) window.visualViewport.addEventListener("resize", applyViewportSize);
window.addEventListener("error", function (e) {
  showError((e.message || e.error || "unknown") + (e.filename ? "\n@ " + e.filename + ":" + e.lineno : ""));
});
window.addEventListener("unhandledrejection", function (e) {
  showError("promise rejected: " + ((e.reason && e.reason.message) || e.reason));
});
window.addEventListener("DOMContentLoaded", function () {
  initDesktopControls();
  initSongWikiControls();
});

let currentLyricLines = [];
let currentLyricMediaId = "";
let lyricClickSeekingInstalled = false;
let reducedMotionPreferenceInstalled = false;

function normalizeMediaId(mediaId) {
  return mediaId == null ? "" : String(mediaId);
}

function callDesktopHost(name) {
  const fn = globalThis[name];
  if (typeof fn === "function") {
    fn();
  }
}

function initDesktopControls() {
  if (document.documentElement.getAttribute("data-platform") !== "desktop") return;
  const back = document.getElementById("desktop-back");
  back && back.addEventListener("click", (event) => {
    event.stopPropagation();
    callDesktopHost("amllBack");
  });
}

function setCurrentLyricLines(lines, mediaId) {
  if (mediaId !== undefined) currentLyricMediaId = normalizeMediaId(mediaId);
  currentLyricLines = Array.isArray(lines) ? lines : [];
  currentLyricLines.forEach(function (line) {
    if (line && currentLyricMediaId) line.mediaId = currentLyricMediaId;
  });
  if (globalThis.__amllDebug) globalThis.__amllDebug.lines = currentLyricLines.length;
}

function notifyHostLyricLineClicked(timeMs, mediaId) {
  const safeTime = Math.max(0, Math.round(Number(timeMs) || 0));
  const safeMediaId = normalizeMediaId(mediaId || currentLyricMediaId);
  if (globalThis.AmllCallback && globalThis.AmllCallback.onLyricLineClicked) {
    globalThis.AmllCallback.onLyricLineClicked(safeTime, safeMediaId);
  } else if (typeof globalThis.amllSeek === "function") {
    globalThis.amllSeek(safeTime, safeMediaId);
  }
}

function collectLyricLineElements() {
  const root = document.getElementById("amll-root");
  if (!root) return [];
  const selectorGroups = [
    ".FmKaba_lyricLineWrapper",
    "[class*='lyricLineWrapper']",
    ".FmKaba_lyricLine",
    "[class*='lyricLine']",
  ];
  for (const selector of selectorGroups) {
    const elements = Array.from(root.querySelectorAll(selector))
      .filter((element) => {
        const rect = element.getBoundingClientRect();
        return rect.width > 0 && rect.height > 0 && element.textContent.trim().length > 0;
      });
    if (elements.length > 0) return elements;
  }
  return [];
}

function tagRenderedLyricLines() {
  const elements = collectLyricLineElements();
  const activeIndex = elements.findIndex((element) =>
    element.classList.contains("FmKaba_active") || Boolean(element.querySelector(".FmKaba_active"))
  );
  elements.forEach((element, index) => {
    element.dataset.amllRenderedLine = String(index);
    element.setAttribute("role", "button");
    element.tabIndex = index === (activeIndex >= 0 ? activeIndex : 0) ? 0 : -1;
    const readableText = element.textContent.trim();
    element.setAttribute("aria-label", readableText ? `跳转到歌词：${readableText}` : "跳转到这句歌词");
    const isActive = element.classList.contains("FmKaba_active") ||
      Boolean(element.querySelector(".FmKaba_active"));
    if (isActive) element.setAttribute("aria-current", "true");
    else element.removeAttribute("aria-current");
  });
}

function scheduleLyricLineTagging() {
  requestAnimationFrame(() => {
    tagRenderedLyricLines();
    requestAnimationFrame(tagRenderedLyricLines);
  });
}

function installLyricClickSeeking() {
  if (lyricClickSeekingInstalled) return;
  const root = document.getElementById("amll-root");
  const player = globalThis.AmllBridge && globalThis.AmllBridge.player;
  if (!root || !player) return;
  lyricClickSeekingInstalled = true;
  player.addEventListener("line-click", function (event) {
    const index = Number(event.lineIndex);
    const lineData = Number.isInteger(index) ? currentLyricLines[index] : null;
    const stableLineData = lineData || event.line;
    const time = Number(stableLineData && stableLineData.startTime);
    if (!Number.isFinite(time)) return;
    notifyHostLyricLineClicked(time, lineData && lineData.mediaId);
  });
  root.addEventListener("keydown", function (event) {
    if (["ArrowUp", "ArrowDown", "Home", "End"].includes(event.key)) {
      const elements = collectLyricLineElements();
      if (!elements.length) return;
      const target = event.target && event.target.closest
        ? event.target.closest("[data-amll-rendered-line]")
        : null;
      const renderedIndex = target ? elements.indexOf(target) : -1;
      const currentIndex = renderedIndex >= 0 ? renderedIndex : 0;
      const nextIndex = event.key === "Home"
        ? 0
        : event.key === "End"
          ? elements.length - 1
          : Math.max(0, Math.min(elements.length - 1, currentIndex + (event.key === "ArrowDown" ? 1 : -1)));
      elements.forEach((element, index) => { element.tabIndex = index === nextIndex ? 0 : -1; });
      elements[nextIndex].focus();
      event.preventDefault();
      return;
    }
    if (event.key !== "Enter" && event.key !== " ") return;
    const target = event.target && event.target.closest
      ? event.target.closest("[data-amll-rendered-line]")
      : null;
    if (!target || !root.contains(target)) return;
    target.click();
    event.preventDefault();
  }, true);
  const lyricObserver = new MutationObserver(scheduleLyricLineTagging);
  lyricObserver.observe(root, {
    subtree: true,
    childList: true,
    attributes: true,
    attributeFilter: ["class"],
  });
}

function installReducedMotionPreference() {
  if (reducedMotionPreferenceInstalled || typeof globalThis.matchMedia !== "function") return;
  const player = globalThis.AmllBridge && globalThis.AmllBridge.player;
  if (!player || typeof player.setEnableSpring !== "function") return;
  reducedMotionPreferenceInstalled = true;
  const preference = globalThis.matchMedia("(prefers-reduced-motion: reduce)");
  const applyPreference = function () {
    player.setEnableSpring(!preference.matches);
  };
  if (typeof preference.addEventListener === "function") {
    preference.addEventListener("change", applyPreference);
  } else if (typeof preference.addListener === "function") {
    preference.addListener(applyPreference);
  }
  applyPreference();
}

function parseLrcSupplement(lrcText) {
  const entries = [];
  const timeRegex = /\[(\d+):(\d+(?:\.\d+)?)\]/g;
  for (const rawLine of String(lrcText || "").split(/\r?\n/)) {
    if (!rawLine || rawLine.trim().startsWith("{")) continue;
    const matches = Array.from(rawLine.matchAll(timeRegex));
    if (!matches.length) continue;
    const text = rawLine.replace(timeRegex, "").trim();
    if (!text) continue;
    matches.forEach(function (match) {
      const minutes = Number(match[1]) || 0;
      const seconds = Number(match[2]) || 0;
      entries.push({ time: Math.round((minutes * 60 + seconds) * 1000), text });
    });
  }
  return entries.sort(function (a, b) { return a.time - b.time; });
}

function nearestSupplement(entries, timeMs) {
  if (!entries || !entries.length) return "";
  let best = null;
  let bestDistance = Number.MAX_VALUE;
  entries.forEach(function (entry) {
    const distance = Math.abs(entry.time - timeMs);
    if (distance <= 850 && distance < bestDistance) {
      best = entry;
      bestDistance = distance;
    }
  });
  return best ? best.text : "";
}

function applyLyricOptions(lines, options) {
  const opts = options || {};
  const translations = opts.showTranslation ? parseLrcSupplement(opts.translatedLyric) : [];
  const romans = opts.showRoman ? parseLrcSupplement(opts.romanLyric) : [];
  return (Array.isArray(lines) ? lines : []).map(function (line) {
    const next = Object.assign({}, line);
    const translation = nearestSupplement(translations, next.startTime);
    if (translation) next.translatedLyric = translation;
    const roman = nearestSupplement(romans, next.startTime);
    if (roman) next.romanLyric = roman;
    return next;
  });
}

function installWordLyricSupport() {
  const bridge = globalThis.AmllBridge;
  if (!bridge) return;
  installLyricClickSeeking();
  installReducedMotionPreference();

  if (!bridge.__redefineLoadLyricsWrapped && bridge.loadLyrics) {
    bridge.__redefineLoadLyricsWrapped = true;
    bridge.loadLyrics = function (lrcText, mediaId, options) {
      if (!this.player) return;
      const parsed = this.parseLrc ? this.parseLrc(lrcText) : [];
      const lines = applyLyricOptions(parsed, options);
      setCurrentLyricLines(lines, mediaId);
      this.player.setLyricLines(lines);
      scheduleLyricLineTagging();
      globalThis.AmllPage && globalThis.AmllPage.hideLoading();
    };
  }

  bridge.resetTrack = function (mediaId) {
    currentLyricMediaId = normalizeMediaId(mediaId);
    setCurrentLyricLines([], currentLyricMediaId);
    this.player?.setLyricLines([]);
  };

  if (bridge.__redefineWordLyricWrapped) return;
  bridge.__redefineWordLyricWrapped = true;
  bridge.loadWordLyrics = function (yrcText, mediaId, options) {
    if (!this.player) return;
    const parsed = this.parseYrc ? this.parseYrc(yrcText) : [];
    const primaryLines = parsed.length ? parsed : (this.parseLrc ? this.parseLrc(yrcText) : []);
    const lines = applyLyricOptions(primaryLines, options);
    setCurrentLyricLines(lines, mediaId);
    this.player.setLyricLines(lines);
    scheduleLyricLineTagging();
    globalThis.AmllPage && globalThis.AmllPage.hideLoading();
  };
}
globalThis.installWordLyricSupport = installWordLyricSupport;

// Signal "engine mounted" to the host. Android exposes a @JavascriptInterface named
// AmllCallback; desktop WebView2 exposes a bound amllReady function.
function signalReady() {
  if (globalThis.AmllCallback && globalThis.AmllCallback.onReady) {
    globalThis.AmllCallback.onReady();            // Android @JavascriptInterface
  } else if (typeof globalThis.amllReady === "function") {
    globalThis.amllReady();                       // desktop webview_java (WebView2) bind
  } else {
  showError("无法连接应用播放控制");
  }
}

// The lyric engine is part of the signed application. Fail fast when that asset is
// absent or incompatible instead of executing mutable remote code inside a native bridge.
async function loadEngine() {
  // Load the locally bundled engine as a CLASSIC script. Android WebView blocks
  // dynamic import()/module scripts over file:// (opaque origin → CORS failure),
  // but a classic <script src> loads fine. The bundle sets globalThis.AmllBridge.
  setStatus("正在加载本地歌词组件…");
  const localOk = await new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = "bundle.js";
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
  if (!localOk) {
    showError("应用内置歌词组件缺失");
    return;
  }
  setStatus("本地组件已就绪，正在启动歌词引擎…");
  try {
    applyViewportSize();
    if (globalThis.AmllBridge && globalThis.AmllBridge.init()) {
      applyViewportSize();
      installWordLyricSupport();
      setStatus("正在等待歌词…");
      signalReady();
      return;
    }
    showError("应用内置歌词组件初始化失败");
  } catch (e) {
    showError("本地歌词组件启动异常：" + (e && e.message ? e.message : e));
  }
}

loadEngine();
</script>
</body>
