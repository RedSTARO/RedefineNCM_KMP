<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101116">
    <title>RedefineNCM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="redefineNcmBoot" role="status" aria-live="polite">
        <div class="boot-spinner" aria-hidden="true"></div>
        <span>正在加载 Web 应用…</span>
    </div>
    <div id="redefineNcmApp"></div>
    <script>
        globalThis.__redefineNcmFontReady = fetch(
            "composeResources/redefinencm_kmp.shared.generated.resources/font/noto_sans_sc_variable.ttf",
            { cache: "force-cache" }
        ).then(response => {
            if (!response.ok) throw new Error("字体加载失败：HTTP " + response.status);
            // Fully consume the response so the browser cache is warm, but do not retain the
            // 17 MB ArrayBuffer as the resolved value of the page-lifetime readiness promise.
            return response.arrayBuffer().then(() => undefined);
        });
    </script>
    <script src="redefinencm.js"></script>
</body>
</html>
