<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>AMLL Lyric Player</title>
<script>
(function () {
  var match = location.search.match(/[?&]platform=([^&]+)/);
  if (match) document.documentElement.setAttribute("data-platform", decodeURIComponent(match[1]));
})();
</script>
<!-- AMLL core stylesheet — REQUIRED for the lyric player to render visibly. -->
<link rel="stylesheet" href="style.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; min-height: 100%; overflow: hidden; background: #0a0a0a;
    /* 注意：不能写 system-ui / -apple-system —— JavaFX WebKit 不认识这些关键字，
       会把整条 font-family 声明判为无效，回退到衬线默认字体（中文=宋体）。 */
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  /* Blurred album-art background. AMLL's lyric rendering (plus-lighter blend) is designed to
     sit over a bright, blurred cover — not plain black — so the cover goes here.
     (WebView2/Chromium 的 GPU 合成下全屏 blur 无压力。) */
  #bg {
    position: absolute; inset: -8%;
    background-size: cover; background-position: center;
    filter: blur(48px) brightness(0.55) saturate(1.3);
    transform: scale(1.1);
    z-index: 0;
    transition: background-image 0.4s ease;
  }
  #amll-root {
    position: fixed; inset: 0; width: 100%; height: 100%; min-height: 100%; z-index: 1;
  }
  .amll-lyric-player {
    width: 100% !important; height: 100% !important;
    font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
  }
  html[data-platform="android"] .amll-lyric-player.dom {
    --amll-lp-line-width-aspect: .72;
    --amll-lp-line-padding-x: clamp(26px, 7.2vw, 54px);
  }
  html[data-platform="android"] #bg {
    inset: -5%;
    filter: blur(24px) brightness(0.46) saturate(1.15);
    transform: scale(1.06);
  }
  html[data-platform="android"] .amll-lyric-player {
    mix-blend-mode: normal !important;
    color: rgba(255,255,255,0.94);
    text-shadow: 0 2px 18px rgba(0,0,0,0.55);
  }
  html[data-platform="android"] .FmKaba_lyricLineWrapper {
    will-change: transform, opacity;
  }
  html[data-platform="android"] .FmKaba_lyricLineWrapper,
  html[data-platform="android"] .FmKaba_lyricLine,
  html[data-platform="android"] .FmKaba_lyricMainLine > span {
    backface-visibility: hidden;
    transform: translateZ(0);
  }
  html[data-platform="android"] .FmKaba_lyricLine {
    padding: .42em var(--amll-lp-line-padding-x, 1em);
  }
  .FmKaba_lyricLine,
  .FmKaba_lyricLineWrapper {
    cursor: pointer;
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_lyricMainLine {
    line-height: 1.08;
    text-wrap: balance;
    overflow-wrap: normal;
    word-break: normal;
    line-break: loose;
  }
  .FmKaba_lyricLine .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.30);
  }
  .FmKaba_lyricLine.FmKaba_active {
    --bright-mask-alpha: 1 !important;
    --dark-mask-alpha: 0.14 !important;
  }
  .FmKaba_lyricLine.FmKaba_active .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.98);
    text-shadow:
      0 0 10px rgba(255,255,255,0.35),
      0 4px 24px rgba(0,0,0,0.35);
  }
  .FmKaba_lyricLine.FmKaba_active .FmKaba_wordBody {
    color: inherit;
    -webkit-text-stroke: 0;
    text-shadow: inherit;
    filter: none;
  }
  .FmKaba_lyricLine .FmKaba_emphasize .FmKaba_wordBody,
  .FmKaba_lyricLine .FmKaba_wordBody.FmKaba_emphasize {
    color: rgba(255,255,255,0.98);
    -webkit-text-stroke: 0.55px rgba(255,255,255,0.58);
    text-shadow:
      0 0 3px rgba(255,255,255,1),
      0 0 14px rgba(226,214,255,0.95),
      0 0 30px rgba(165,126,255,0.62);
    filter: drop-shadow(0 0 10px rgba(190,160,255,0.52));
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active .FmKaba_wordBody {
    color: inherit;
    -webkit-text-stroke: 0;
    text-shadow: inherit;
    filter: none;
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.28);
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active {
    --bright-mask-alpha: 1 !important;
    --dark-mask-alpha: 0.12 !important;
  }
  html[data-platform="android"] .FmKaba_lyricLine.FmKaba_active .FmKaba_lyricMainLine {
    color: rgba(255,255,255,0.98);
    text-shadow:
      0 0 10px rgba(255,255,255,0.38),
      0 4px 24px rgba(0,0,0,0.35);
  }
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_emphasize .FmKaba_wordBody,
  html[data-platform="android"] .FmKaba_lyricLine .FmKaba_wordBody.FmKaba_emphasize {
    color: rgba(255,255,255,0.96);
    -webkit-text-stroke: 0.45px rgba(255,255,255,0.52);
    text-shadow:
      0 0 3px rgba(255,255,255,0.98),
      0 0 10px rgba(226,214,255,0.82),
      0 0 22px rgba(165,126,255,0.50);
    filter: drop-shadow(0 0 7px rgba(190,160,255,0.42));
  }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6);
    font-family: system-ui, sans-serif; font-size: 14px;
    z-index: 10; pointer-events: none;
  }
</style>
</head>
<body>
<div id="bg"></div>
<div id="loading">Loading lyric engine...</div>
<div id="amll-root"></div>

<script>
// ── CDN fallback: esm.sh handles PixiJS transitive deps ──
const CDN = "https://esm.sh/@applemusic-like-lyrics";
const VER = "latest";

// Surface any failure on-screen (and to the host console) so a blank panel becomes a
// readable error on both Android WebView and desktop WebView2, not just black.
let errored = false;
function showError(msg) {
  errored = true;
  const el = document.getElementById("loading");
  if (el) {
    el.style.color = "#ff8a8a";
    el.style.whiteSpace = "pre-wrap";
    el.style.padding = "16px";
    el.style.fontSize = "12px";
    el.textContent = "Lyric engine error:\n" + msg;
  }
  console.error("AMLL error:", msg);
}
// Breadcrumb so the user can see how far load got (overwritten unless an error stuck).
function setStatus(s) {
  if (errored) return;
  const el = document.getElementById("loading");
  if (el) el.textContent = s;
  console.log("AMLL status:", s);
}
function hideLoading() {
  const el = document.getElementById("loading");
  if (el) el.remove();
}
function applyViewportSize() {
  const viewport = window.visualViewport;
  const width = Math.max(
    1,
    Math.round((viewport && viewport.width) || window.innerWidth || document.documentElement.clientWidth || screen.width || 0),
  );
  const height = Math.max(
    1,
    Math.round((viewport && viewport.height) || window.innerHeight || document.documentElement.clientHeight || screen.height || 0),
  );
  const widthPx = width + "px";
  const heightPx = height + "px";
  [
    document.documentElement,
    document.body,
    document.getElementById("amll-root"),
    document.querySelector(".amll-lyric-player"),
  ].forEach(function (el) {
    if (!el) return;
    el.style.width = widthPx;
    el.style.height = heightPx;
    el.style.minHeight = heightPx;
  });
  const bg = document.getElementById("bg");
  if (bg) {
    const overscanX = Math.ceil(width * 0.1);
    const overscanY = Math.ceil(height * 0.1);
    bg.style.position = "fixed";
    bg.style.left = -overscanX + "px";
    bg.style.top = -overscanY + "px";
    bg.style.right = "auto";
    bg.style.bottom = "auto";
    bg.style.width = width + overscanX * 2 + "px";
    bg.style.height = height + overscanY * 2 + "px";
    bg.style.minHeight = height + overscanY * 2 + "px";
  }
}
globalThis.AmllPage = { setStatus, showError, hideLoading, applyViewportSize };
applyViewportSize();
requestAnimationFrame(applyViewportSize);
window.addEventListener("resize", applyViewportSize);
if (window.visualViewport) window.visualViewport.addEventListener("resize", applyViewportSize);
window.addEventListener("error", function (e) {
  showError((e.message || e.error || "unknown") + (e.filename ? "\n@ " + e.filename + ":" + e.lineno : ""));
});
window.addEventListener("unhandledrejection", function (e) {
  showError("promise rejected: " + ((e.reason && e.reason.message) || e.reason));
});

let currentLyricLines = [];
let currentLyricMediaId = "";
let lyricClickSeekingInstalled = false;

function normalizeMediaId(mediaId) {
  return mediaId == null ? "" : String(mediaId);
}

function setCurrentLyricLines(lines, mediaId) {
  if (mediaId !== undefined) currentLyricMediaId = normalizeMediaId(mediaId);
  currentLyricLines = Array.isArray(lines) ? lines : [];
  currentLyricLines.forEach(function (line) {
    if (line && currentLyricMediaId) line.mediaId = currentLyricMediaId;
  });
  if (globalThis.__amllDebug) globalThis.__amllDebug.lines = currentLyricLines.length;
}

function notifyHostLyricLineClicked(timeMs, mediaId) {
  const safeTime = Math.max(0, Math.round(Number(timeMs) || 0));
  const safeMediaId = normalizeMediaId(mediaId || currentLyricMediaId);
  if (globalThis.AmllCallback && globalThis.AmllCallback.onLyricLineClicked) {
    globalThis.AmllCallback.onLyricLineClicked(safeTime, safeMediaId);
  } else if (typeof globalThis.amllSeek === "function") {
    globalThis.amllSeek(safeTime, safeMediaId);
  } else if (globalThis.amllHost && globalThis.amllHost.onLyricLineClicked) {
    globalThis.amllHost.onLyricLineClicked(safeTime, safeMediaId);
  } else if (typeof globalThis.cefQuery === "function") {
    globalThis.cefQuery({ request: "seekTo:" + safeTime + ":" + safeMediaId, onSuccess: function () {}, onFailure: function () {} });
  }
}

function installLyricClickSeeking() {
  if (lyricClickSeekingInstalled) return;
  const root = document.getElementById("amll-root");
  if (!root) return;
  lyricClickSeekingInstalled = true;
  root.addEventListener("click", function (event) {
    const eventTarget = event.target && event.target.nodeType === 1
      ? event.target
      : event.target && event.target.parentElement;
    const target = eventTarget && eventTarget.closest
      ? eventTarget.closest(".FmKaba_lyricLineWrapper, .FmKaba_lyricLine")
      : null;
    if (!target || !root.contains(target)) return;

    const wrapper = target.classList.contains("FmKaba_lyricLineWrapper")
      ? target
      : target.closest(".FmKaba_lyricLineWrapper");
    const wrappers = Array.from(root.querySelectorAll(".FmKaba_lyricLineWrapper"));
    let index = wrappers.indexOf(wrapper);
    if (index < 0) {
      const line = target.classList.contains("FmKaba_lyricLine")
        ? target
        : target.closest(".FmKaba_lyricLine");
      index = Array.from(root.querySelectorAll(".FmKaba_lyricLine")).indexOf(line);
    }

    const lineData = currentLyricLines[index];
    const time = Number(lineData && lineData.startTime);
    if (!Number.isFinite(time)) return;
    notifyHostLyricLineClicked(time, lineData && lineData.mediaId);
  }, true);
}

function normalizeYrcWordStart(lineStart, lineDuration, wordStart) {
  if (wordStart < lineStart && wordStart <= lineDuration) return lineStart + wordStart;
  return wordStart;
}

function parseYrcText(yrcText) {
  const lines = [];
  const lineRegex = /^\[(\d+),(\d+)\](.*)$/;
  const wordRegex = /\((\d+),(\d+)(?:,\d+)?\)([^()]*)/g;

  for (const rawLine of String(yrcText || "").split(/\r?\n/)) {
    const match = rawLine.trim().match(lineRegex);
    if (!match) continue;

    const lineStart = Number(match[1]) || 0;
    const lineDuration = Number(match[2]) || 0;
    const body = match[3] || "";
    const words = [];
    let wordMatch;
    wordRegex.lastIndex = 0;
    while ((wordMatch = wordRegex.exec(body)) !== null) {
      const rawStart = Number(wordMatch[1]) || 0;
      const duration = Math.max(0, Number(wordMatch[2]) || 0);
      const word = wordMatch[3] || "";
      if (!word) continue;
      const startTime = normalizeYrcWordStart(lineStart, lineDuration, rawStart);
      words.push({ startTime, endTime: startTime + duration, word });
    }
    if (!words.length) continue;

    const fallbackEnd = lineStart + Math.max(0, lineDuration);
    const endTime = Math.max(fallbackEnd, ...words.map((word) => word.endTime));
    lines.push({
      startTime: lineStart,
      endTime,
      words,
      translatedLyric: "",
      romanLyric: "",
      isBG: false,
      isDuet: false,
    });
  }

  lines.sort((a, b) => a.startTime - b.startTime);
  for (let i = 0; i < lines.length - 1; i++) {
    if (lines[i].endTime <= lines[i].startTime || lines[i].endTime > lines[i + 1].startTime) {
      lines[i].endTime = lines[i + 1].startTime;
    }
  }
  return lines;
}

function installWordLyricSupport() {
  const bridge = globalThis.AmllBridge;
  if (!bridge) return;
  installLyricClickSeeking();

  if (!bridge.__redefineLoadLyricsWrapped && bridge.loadLyrics) {
    bridge.__redefineLoadLyricsWrapped = true;
    bridge.loadLyrics = function (lrcText, mediaId) {
      if (!this.player) return;
      const parsed = this.parseLrc ? this.parseLrc(lrcText) : [];
      setCurrentLyricLines(parsed, mediaId);
      this.player.setLyricLines(parsed);
      globalThis.AmllPage && globalThis.AmllPage.hideLoading();
    };
  }

  bridge.resetTrack = function (mediaId) {
    currentLyricMediaId = normalizeMediaId(mediaId);
    setCurrentLyricLines([], currentLyricMediaId);
    this.player?.setLyricLines([]);
  };

  bridge.parseYrc = parseYrcText;
  if (bridge.__redefineWordLyricWrapped) return;
  bridge.__redefineWordLyricWrapped = true;
  bridge.loadWordLyrics = function (yrcText, mediaId) {
    if (!this.player) return;
    const parsed = parseYrcText(yrcText);
    const lines = parsed.length ? parsed : (this.parseLrc ? this.parseLrc(yrcText) : []);
    setCurrentLyricLines(lines, mediaId);
    this.player.setLyricLines(lines);
    globalThis.AmllPage && globalThis.AmllPage.hideLoading();
  };
}
globalThis.installWordLyricSupport = installWordLyricSupport;

// Signal "engine mounted" to the host. Android exposes a @JavascriptInterface named
// AmllCallback; desktop WebView2 exposes a bound amllReady function.
function signalReady() {
  if (globalThis.AmllCallback && globalThis.AmllCallback.onReady) {
    globalThis.AmllCallback.onReady();            // Android @JavascriptInterface
  } else if (typeof globalThis.amllReady === "function") {
    globalThis.amllReady();                       // desktop webview_java (WebView2) bind
  } else if (globalThis.amllHost && globalThis.amllHost.onReady) {
    globalThis.amllHost.onReady();                // desktop JavaFX JSObject bridge (legacy)
  } else if (typeof globalThis.cefQuery === "function") {
    globalThis.cefQuery({ request: "onReady", onSuccess: function () {}, onFailure: function () {} });
  } else {
    // The host bridge can be injected AFTER the page finishes loading (e.g. JavaFX sets
    // window.amllHost on load SUCCEEDED), which may be after the engine mounts. Retry.
    setTimeout(signalReady, 100);
  }
}

// Try local bundle first, fall back to CDN
async function loadEngine() {
  // Load the locally bundled engine as a CLASSIC script. Android WebView blocks
  // dynamic import()/module scripts over file:// (opaque origin → CORS failure),
  // but a classic <script src> loads fine. The bundle sets globalThis.AmllBridge.
  setStatus("loading local bundle…");
  const localOk = await new Promise((resolve) => {
    const s = document.createElement("script");
    s.src = "bundle.js";
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
  setStatus(localOk ? "bundle loaded, starting engine…" : "local bundle missing, trying CDN…");
  try {
    applyViewportSize();
    if (localOk && globalThis.AmllBridge && globalThis.AmllBridge.init()) {
      applyViewportSize();
      installWordLyricSupport();
      setStatus("waiting for lyrics...");
      signalReady();
      return;
    }
    if (localOk) setStatus("engine init returned false, trying CDN…");
  } catch (e) {
    showError("local engine init threw: " + (e && e.message ? e.message : e));
    console.warn("AMLL: local engine init failed, falling back to CDN", e);
  }

  // CDN fallback with importmap
  const imp = document.createElement("script");
  imp.type = "importmap-shim";
  imp.textContent = JSON.stringify({
    imports: {
      "@applemusic-like-lyrics/core": `${CDN}/core@${VER}/+esm`,
      "@applemusic-like-lyrics/lyric": `${CDN}/lyric@${VER}/+esm`,
    },
  });
  document.head.appendChild(imp);

  // Load es-module-shims for importmap support
  const shim = document.createElement("script");
  shim.src = "https://ga.jspm.io/npm:es-module-shims@2/dist/es-module-shims.js";
  shim.async = true;
  document.head.appendChild(shim);

  await new Promise((resolve) => (shim.onload = resolve));

  const main = document.createElement("script");
  main.type = "esms-import";
  main.textContent = `
    import { LyricPlayer } from "@applemusic-like-lyrics/core";
    import { parseLrc } from "@applemusic-like-lyrics/lyric";

    globalThis.AmllBridge = {
      LyricPlayer, parseLrc, player: null,
      init() {
        const root = document.getElementById("amll-root");
        if (!root) return false;
        this.player = new LyricPlayer();
        root.appendChild(this.player.getElement());
        globalThis.AmllPage && globalThis.AmllPage.applyViewportSize();
        let last = -1;
        const frame = (t) => {
          if (last < 0) last = t;
          this.player.update(t - last);
          last = t;
          requestAnimationFrame(frame);
        };
        requestAnimationFrame(frame);
        return true;
      },
      loadLyrics(lrcText) {
        if (!this.player) return;
        this.player.setLyricLines(parseLrc(lrcText));
        globalThis.AmllPage && globalThis.AmllPage.hideLoading();
      },
      setTime(timeMs) {
        this.player?.setCurrentTime(timeMs);
      },
      setBackground(url) {
        const el = document.getElementById("bg");
        if (el && url) el.style.backgroundImage = 'url("' + url + '")';
      },
      setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
      },
    };

    globalThis.installWordLyricSupport && globalThis.installWordLyricSupport();

    // Auto-init
    const ok = globalThis.AmllBridge.init();
    if (!ok) console.error("AMLL: failed to init");
    else globalThis.signalReady && globalThis.signalReady();
  `;
  document.body.appendChild(main);
}

loadEngine();
</script>
</body>
</html>
